const EUR_BGN = 1.95583;

// ── NUMBER TO WORDS (BG) ──
function numToWordsBG(n) {
  if (n === 0) return 'нула';
  const ones = ['','едно','две','три','четири','пет','шест','седем','осем','девет',
    'десет','единадесет','дванадесет','тринадесет','четиринадесет','петнадесет',
    'шестнадесет','седемнадесет','осемнадесет','деветнадесет'];
  const tens = ['','','двадесет','тридесет','четиридесет','петдесет','шестдесет','седемдесет','осемдесет','деветдесет'];
  const hundreds = ['','сто','двеста','триста','четиристотин','петстотин','шестстотин','седемстотин','осемстотин','деветстотин'];
  let r = '';
  if (n >= 1000) {
    const th = Math.floor(n / 1000);
    if (th === 1) r += 'хиляда ';
    else if (th === 2) r += 'две хиляди ';
    else if (th < 20) r += ones[th] + ' хиляди ';
    else { const t=Math.floor(th/10),o=th%10; r += tens[t]+(o?' и '+ones[o]:'')+' хиляди '; }
    n %= 1000;
  }
  if (n >= 100) { r += hundreds[Math.floor(n/100)]+' '; n%=100; if(n>0) r+='и '; }
  if (n >= 20) { r += tens[Math.floor(n/10)]; n%=10; if(n>0) r+=' и '+ones[n]; r+=' '; }
  else if (n > 0) r += ones[n]+' ';
  return r.trim();
}

function amountInWords(amount, currency) {
  const int = Math.floor(amount);
  const dec = Math.round((amount - int) * 100);
  let w = numToWordsBG(int);
  if (currency === 'EUR') { w += ' евро'; if(dec>0) w += ' и '+numToWordsBG(dec)+' цента'; }
  else { w += ' лева'; if(dec>0) w += ' и '+numToWordsBG(dec)+' стотинки'; }
  return w.charAt(0).toUpperCase() + w.slice(1);
}

function fmtNum(n) { return parseFloat(n).toFixed(2).replace('.', ','); }
function today() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();
}
function fromInputDate(d) {
  if (!d) return '';
  const p = d.split('-');
  return p[2]+'.'+p[1]+'.'+p[0];
}

// ── STATE ──
let allReceipts = [];
let filterCurrent = 'all';
let selectedId = null;
let currentType = 'АВ';

// ── FIREBASE ──
async function loadReceipts() {
  setSyncStatus('syncing');
  try {
    const { collection, getDocs } = window._fsLib;
    const snap = await getDocs(collection(window._db, 'receipts'));
    allReceipts = [];
    snap.forEach(d => allReceipts.push({id: d.id, ...d.data()}));
    allReceipts.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
    setSyncStatus('synced');
    renderList();
  } catch(e) {
    setSyncStatus('error');
    console.error(e);
  }
}

async function saveReceipt(data) {
  const { collection, doc, setDoc } = window._fsLib;
  const id = data.id || 'REC_'+Date.now();
  data.id = id;
  data.createdAt = new Date().toISOString();
  await setDoc(doc(collection(window._db,'receipts'), id), data);
  return id;
}

async function deleteReceipt(id) {
  const { collection, doc, deleteDoc } = window._fsLib;
  await deleteDoc(doc(collection(window._db,'receipts'), id));
}

function nextNumber(type) {
  const nums = allReceipts.filter(r => r.type===type).map(r => {
    const m = (r.number||'').match(/\d+$/);
    return m ? parseInt(m[0]) : 0;
  });
  const max = nums.length ? Math.max(...nums) : 0;
  return type+'-'+String(max+1).padStart(3,'0');
}

function setSyncStatus(s) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status '+(s==='synced'?'synced':s==='syncing'?'syncing':'');
  el.textContent = s==='synced'?'✓ Синхронизирано':s==='syncing'?'⟳ Зарежда...':'⚠ Грешка';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── FILTER ──
function filterType(type, btn) {
  filterCurrent = type;
  document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ── RENDER LIST ──
function renderList() {
  const list = document.getElementById('receiptList');
  const items = filterCurrent==='all' ? allReceipts : allReceipts.filter(r=>r.type===filterCurrent);
  if (!items.length) {
    list.innerHTML = '<div class="empty-list">Няма бележки'+(filterCurrent!=='all'?' от тип '+filterCurrent:'')+'.</div>';
    return;
  }
  list.innerHTML = items.map(r=>`
    <div class="receipt-item${r.id===selectedId?' active':''}" onclick="selectReceipt('${r.id}')">
      <span class="type-badge b-${r.type}">${r.number||r.type}</span>
      <div class="ri-info">
        <div class="ri-name">${r.client||'—'}</div>
        <div class="ri-meta">${r.date||''}</div>
      </div>
      <div class="ri-amount">${fmtNum(r.amount)} ${r.currency}</div>
    </div>`).join('');
}

// ── SELECT ──
function selectReceipt(id) {
  selectedId = id;
  renderList();
  const r = allReceipts.find(x=>x.id===id);
  if (r) renderView(r);
}

// ── VIEW ──
function renderView(r) {
  const tc = TYPES[r.type];
  const words = r.amountWords || amountInWords(parseFloat(r.amount), r.currency);
  const bgnStr = r.currency==='EUR'
    ? `<span style="font-size:.85rem;color:var(--muted);margin-left:8px;">≈ ${fmtNum(parseFloat(r.amount)*EUR_BGN)} лв.</span>`
    : '';

  let extra = '';
  if (tc.descField && r.description) {
    extra += `<div class="view-desc-box"><div class="vg-label">${tc.descLabel}</div><div style="font-size:.9rem;margin-top:4px;">${r.description}</div></div>`;
  }
  if (tc.termField && r.term) {
    extra += `<div style="margin-bottom:12px;"><div class="vg-label">Краен срок</div><div class="vg-value">${r.term}</div></div>`;
  }
  if (r.note) {
    extra += `<div class="view-note-box"><span style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:3px;">Забележка</span>${r.note}</div>`;
  }

  document.getElementById('rightPanel').innerHTML = `
    <div class="view-header">
      <span class="type-badge b-${r.type}" style="font-size:.75rem;padding:5px 10px;">${r.number||r.type}</span>
      <div>
        <div class="view-number">${tc.label}</div>
        <div class="view-date">${r.date||''}&nbsp;·&nbsp;Договор №: ${r.contractNo||'—'}</div>
      </div>
    </div>
    <div class="view-grid">
      <div><div class="vg-label">Клиент</div><div class="vg-value">${r.client}</div></div>
      <div><div class="vg-label">Обект / Адрес</div><div class="vg-value">${r.object}</div></div>
    </div>
    <div class="view-amount-box">
      <div class="vg-label">${tc.sumLabel}</div>
      <div class="view-amount-val">${fmtNum(r.amount)} ${r.currency}${bgnStr}</div>
      <div class="view-amount-words">${words}</div>
    </div>
    ${extra}
    <div class="divider"></div>
    <div class="action-row">
      <button class="btn-save" onclick="editReceipt('${r.id}')">✏️ Редактирай</button>
      <button class="btn-pdf-d" onclick="generateDigitalPDF('${r.id}')">🎨 Дигитален PDF</button>
      <button class="btn-pdf-o" onclick="generateOfficialPDF('${r.id}')">📄 Официален PDF</button>
      <button class="btn-del" onclick="doDelete('${r.id}')">🗑 Изтрий</button>
    </div>`;
}

// ── DELETE ──
async function doDelete(id) {
  if (!confirm('Изтриване на тази бележка?')) return;
  await deleteReceipt(id);
  allReceipts = allReceipts.filter(x=>x.id!==id);
  selectedId = null;
  renderList();
  document.getElementById('rightPanel').innerHTML = `<div class="empty-state"><div class="es-icon">📝</div><div class="es-text">Изберете бележка или създайте нова.</div></div>`;
  showToast('Бележката е изтрита.');
}

// ── EDIT ──
function editReceipt(id) {
  const r = allReceipts.find(x=>x.id===id);
  if (!r) return;
  selectedId = id;
  currentType = r.type;
  renderList();
  renderForm();
  // Попълваме полетата след рендера
  setTimeout(() => {
    const tc = TYPES[currentType];
    document.getElementById('fClient').value = r.client || '';
    document.getElementById('fObject').value = r.object || '';
    document.getElementById('fContract').value = r.contractNo || '';
    const dateISO = r.date ? r.date.split('.').reverse().join('-') : '';
    document.getElementById('fDate').value = dateISO;
    document.getElementById('fAmount').value = r.amount || '';
    document.getElementById('fCurrency').value = r.currency || 'EUR';
    if (tc.descField && document.getElementById('fDesc')) document.getElementById('fDesc').value = r.description || '';
    if (tc.termField && document.getElementById('fTerm')) {
      const termISO = r.term ? r.term.split('.').reverse().join('-') : '';
      document.getElementById('fTerm').value = termISO;
    }
    if (tc.totalField && document.getElementById('fTotal')) {
      document.getElementById('fTotal').value = r.contractTotal || '';
      document.getElementById('fRemaining').value = r.remaining || '';
    }
    document.getElementById('fNote').value = r.note || '';
    updateWords();
  }, 50);
}

// ── FORM ──
function showForm(type) {
  selectedId = null;
  currentType = type || 'АВ';
  renderList();
  renderForm();
}

function renderForm() {
  const tc = TYPES[currentType];
  const nextNum = nextNumber(currentType);

  const typeButtons = Object.keys(TYPES).map(t=>`
    <button class="type-btn${currentType===t?' sel-'+t:''}" onclick="switchType('${t}')">
      <div class="tb-code tb-code-${t}">${t}</div>
      <div class="tb-label">${TYPES[t].label}</div>
    </button>`).join('');

  const descField = tc.descField ? `
    <div class="fg full">
      <label>${tc.descLabel}</label>
      <textarea id="fDesc" placeholder="${tc.descPlaceholder}"></textarea>
    </div>` : '';

  const termField = tc.termField ? `
    <div class="fg">
      <label>Краен срок</label>
      <input type="date" id="fTerm">
    </div>` : '<div class="fg"></div>';

  document.getElementById('rightPanel').innerHTML = `
    <div class="form-section-title">Тип бележка</div>
    <div class="type-selector">${typeButtons}</div>

    <div class="form-section-title" style="margin-top:20px;">Данни &nbsp;<span style="color:var(--gold);font-style:italic;font-size:.85rem;font-weight:400;text-transform:none;letter-spacing:0;">${nextNum}</span></div>
    <div class="form-grid">
      <div class="fg">
        <label>Клиент (три имена)</label>
        <input type="text" id="fClient" placeholder="Иван Петров Георгиев">
      </div>
      <div class="fg">
        <label>Договор №</label>
        <input type="text" id="fContract" placeholder="001 / 2026">
      </div>
      <div class="fg full">
        <label>Обект / Адрес</label>
        <input type="text" id="fObject" placeholder="бул. Витоша 48, ап. 7, София">
      </div>
      <div class="fg">
        <label>Дата</label>
        <input type="date" id="fDate" value="${new Date().toISOString().slice(0,10)}">
      </div>
      ${tc.descField ? '<div class="fg"></div>' : '<div class="fg"></div>'}
      ${descField}
      ${termField}
      <div class="fg full">
        <label>${tc.sumLabel}</label>
        <div class="amount-row">
          <input type="number" id="fAmount" placeholder="0.00" min="0" step="0.01" oninput="updateWords();updateRemaining()">
          <select id="fCurrency" onchange="updateWords()">
            <option value="EUR">EUR</option>
            <option value="BGN">лв.</option>
          </select>
        </div>
        <div class="words-box" id="wordsBox">–</div>
      </div>
      ${tc.totalField ? `
      <div class="fg">
        <label>Обща стойност по договор <span class="opt-badge">незадължително</span></label>
        <div class="amount-row"><input type="number" id="fTotal" placeholder="0.00" min="0" step="0.01" oninput="updateRemaining()"><span style="padding:10px 8px;font-size:.85rem;color:var(--muted);">EUR</span></div>
      </div>
      <div class="fg">
        <label>Остатък за доплащане</label>
        <div class="amount-row"><input type="number" id="fRemaining" placeholder="—" readonly style="background:var(--bg2);color:var(--green);font-weight:700;"><span style="padding:10px 8px;font-size:.85rem;color:var(--muted);">EUR</span></div>
      </div>` : ""}
      <div class="fg full">
        <label>Забележка <span class="opt-badge">незадължително</span></label>
        <textarea id="fNote" placeholder="${tc.notePlaceholder}" style="min-height:52px;"></textarea>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-save" onclick="doSave()">💾 Запази</button>
      <button class="btn-pdf-d" onclick="doSaveAndPDF('digital')">🎨 Дигитален PDF</button>
      <button class="btn-pdf-o" onclick="doSaveAndPDF('official')">📄 Официален PDF</button>
      <button onclick="cancelForm()" style="background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 18px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;">✕ Откажи</button>
    </div>`;
}

function switchType(t) { currentType = t; renderForm(); }

function updateRemaining() {
  const total = parseFloat(document.getElementById("fTotal")?.value) || 0;
  const amount = parseFloat(document.getElementById("fAmount")?.value) || 0;
  const rem = document.getElementById("fRemaining");
  if (rem) rem.value = total > 0 ? (total - amount).toFixed(2) : "";
}

function cancelForm() {
  selectedId = null;
  document.getElementById('rightPanel').innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:24px 0;">Избери бележка от списъка или създай нова.</div>';
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateWords() {
  const a = parseFloat(document.getElementById('fAmount').value);
  const cur = document.getElementById('fCurrency').value;
  const box = document.getElementById('wordsBox');
  if (!a || isNaN(a)) { box.textContent = '–'; return; }
  let txt = amountInWords(a, cur);
  if (cur === 'EUR') txt += '  (≈ '+fmtNum(a*EUR_BGN)+' лв.)';
  box.textContent = txt;
}

function collectFormData() {
  const client = (document.getElementById('fClient').value||'').trim();
  const object = (document.getElementById('fObject').value||'').trim();
  const amtStr = document.getElementById('fAmount').value;
  if (!client) { showToast('⚠ Въведи клиент!'); return null; }
  if (!object) { showToast('⚠ Въведи обект!'); return null; }
  if (!amtStr || parseFloat(amtStr) <= 0) { showToast('⚠ Въведи сума!'); return null; }
  const tc = TYPES[currentType];
  if (tc.descField) {
    const desc = (document.getElementById('fDesc').value||'').trim();
    if (!desc) { showToast('⚠ Въведи описание!'); return null; }
  }
  const amount = parseFloat(amtStr);
  const currency = document.getElementById('fCurrency').value;
  const data = {
    type: currentType,
    number: nextNumber(currentType),
    client, object,
    contractNo: (document.getElementById('fContract').value||'').trim(),
    date: fromInputDate(document.getElementById('fDate').value),
    amount, currency,
    amountWords: amountInWords(amount, currency),
    note: (document.getElementById('fNote').value||'').trim()
  };
  if (tc.descField) data.description = (document.getElementById('fDesc').value||'').trim();
  if (tc.termField) data.term = fromInputDate(document.getElementById('fTerm').value);
  if (tc.totalField) {
    const tot = parseFloat(document.getElementById('fTotal')?.value) || 0;
    if (tot > 0) { data.contractTotal = tot; data.remaining = parseFloat((tot - data.amount).toFixed(2)); }
  }
  return data;
}

async function doSave() {
  const data = collectFormData();
  if (!data) return;
  try {
    if (selectedId) {
      // Редактиране на съществуваща
      data.id = selectedId;
      const existing = allReceipts.find(x=>x.id===selectedId);
      data.number = existing ? existing.number : data.number;
      await saveReceipt(data);
      const idx = allReceipts.findIndex(x=>x.id===selectedId);
      if (idx >= 0) allReceipts[idx] = data;
    } else {
      const id = await saveReceipt(data);
      data.id = id;
      allReceipts.unshift(data);
      selectedId = id;
    }
    renderList();
    renderView(data);
    showToast('✓ Запазено — '+data.number);
  } catch(e) { showToast('Грешка при запис!'); console.error(e); }
}

async function doSaveAndPDF(pdfType) {
  const data = collectFormData();
  if (!data) return;
  try {
    const id = await saveReceipt(data);
    data.id = id;
    allReceipts.unshift(data);
    selectedId = id;
    renderList();
    renderView(data);
    if (pdfType === 'digital') generateDigitalPDF(id);
    else generateOfficialPDF(id);
  } catch(e) { showToast('Грешка!'); console.error(e); }
}

// ── DIGITAL PDF ──

  const html=`<div style="font-family:Arial,sans-serif;background:#fff;width:794px;padding:0;"><div style="background:#141c2b;padding:18px 28px 14px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><div><div style="font-size:26px;font-weight:900;color:#fff;">IVANOV <span style="color:#e9a825;">REMONTI</span></div><div style="font-size:9px;color:#6b85a0;margin-top:2px;">\u0421\u0422\u0420\u041e\u0418\u0422\u0415\u041b\u041d\u0418 \u0423\u0421\u041b\u0423\u0413\u0418 \u00b7 \u0421\u041e\u0424\u0418\u042f \u0418 \u0420\u0415\u0413\u0418\u041e\u041d</div></div><div style="text-align:right;font-size:10px;color:#6b85a0;line-height:1.7;"><div>0877 810 418</div><div>ivanovremontibg@gmail.com</div><div>ivanov-remonti.com</div></div></div></div><div style="background:${tBkg};border-left:4px solid ${tColor};padding:8px 28px;display:flex;justify-content:space-between;align-items:center;"><div style="font-size:13px;font-weight:700;color:${tColor};">${tc.officialTitle}</div><div style="font-size:11px;color:#6b85a0;">${r.number} \u00b7 ${r.date}</div></div><div style="padding:20px 28px;"><div style="background:#f8fafc;border:1px solid #d5e0ea;border-left:3px solid ${tColor};border-radius:6px;padding:12px 16px;margin-bottom:14px;display:grid;grid-template-columns:1fr 1fr;gap:8px;"><div><div style="font-size:9px;font-weight:700;color:#6b85a0;text-transform:uppercase;margin-bottom:2px;">\u041a\u041b\u0418\u0415\u041d\u0422</div><div style="font-size:13px;font-weight:700;color:#141c2b;">${r.client||'\u2014'}</div><div style="font-size:9px;font-weight:700;color:#6b85a0;text-transform:uppercase;margin-top:6px;margin-bottom:2px;">\u0414\u041e\u0413\u041e\u0412\u041e\u0420 \u2116</div><div style="font-size:12px;color:#141c2b;">${r.contractNo||'\u2014'}</div></div><div><div style="font-size:9px;font-weight:700;color:#6b85a0;text-transform:uppercase;margin-bottom:2px;">\u041e\u0411\u0415\u041a\u0422 / \u0410\u0414\u0420\u0415\u0421</div><div style="font-size:12px;color:#141c2b;">${r.object||'\u2014'}</div></div></div>${descB}<div style="background:#fffbf0;border:1px solid #c8891a;border-left:3px solid #c8891a;border-radius:6px;padding:12px 16px;margin-bottom:10px;"><div style="font-size:9px;font-weight:700;color:#6b85a0;text-transform:uppercase;margin-bottom:4px;">${tc.sumLabel}</div><div style="font-size:22px;font-weight:700;color:#141c2b;">${fmtNum(r.amount)} ${r.currency}${amtBGN}</div><div style="font-size:10px;color:#6b85a0;font-style:italic;margin-top:2px;">\u0421 \u0434\u0443\u043c\u0438: ${r.amountWords}</div></div>${remB}${termB}${noteB}<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;"><div style="background:#f8fafc;border:1px solid #d5e0ea;border-left:3px solid ${tColor};border-radius:6px;padding:12px 16px;min-height:80px;"><div style="font-size:9px;font-weight:700;color:#6b85a0;text-transform:uppercase;margin-bottom:16px;">${tc.sigLeft}</div><div style="border-bottom:1px solid #141c2b;margin-bottom:4px;height:24px;"></div><div style="display:flex;justify-content:space-between;font-size:9px;color:#6b85a0;"><span>\u041f\u043e\u0434\u043f\u0438\u0441</span><span>${r.date||''}</span></div></div><div style="background:#f8fafc;border:1px solid #d5e0ea;border-left:3px solid #141c2b;border-radius:6px;padding:12px 16px;min-height:80px;"><div style="font-size:9px;font-weight:700;color:#6b85a0;text-transform:uppercase;margin-bottom:4px;">${tc.sigRight}</div><div style="font-size:12px;font-weight:700;color:#141c2b;margin-bottom:8px;">\u0422\u0440\u0430\u044f\u043d \u0418\u0432\u0430\u043d\u043e\u0432 \u041f\u044a\u0440\u0432\u0430\u043d\u043e\u0432</div><div style="border-bottom:1px solid #141c2b;margin-bottom:4px;height:12px;"></div><div style="display:flex;justify-content:space-between;font-size:9px;color:#6b85a0;"><span>\u041f\u043e\u0434\u043f\u0438\u0441</span><span>${r.date||''}</span></div></div></div><div style="border-top:1px solid #c8891a;margin-top:20px;padding-top:8px;display: function generateOfficialPDF(id) {
  const r = allReceipts.find(x=>x.id===id);
  if (!r) return;
  const tc = TYPES[r.type];
  const amtBGN=r.currency==='EUR'?' / '+fmtNum(parseFloat(r.amount)*EUR_BGN)+' \u043b\u0432.':'';
  const remSec=r.contractTotal?`<hr style="border:none;border-top:1px solid #999;margin:10px 0;"><p style="font-size:11px;color:#444;margin-bottom:4px;">\u041e\u0431\u0449\u0430 \u0441\u0442\u043e\u0439\u043d\u043e\u0441\u0442 \u043f\u043e \u0434\u043e\u0433\u043e\u0432\u043e\u0440: <strong>${fmtNum(r.contractTotal)} EUR</strong></p><p style="font-size:13px;font-weight:700;color:#1a7a52;">\u041e\u0441\u0442\u0430\u0442\u044a\u043a \u0437\u0430 \u0434\u043e\u043f\u043b\u0430\u0449\u0430\u043d\u0435: ${fmtNum(r.remaining)} EUR</p>`:'';
  let body='';

    body=`<p style="font-size:14px;color:#1a1a1a;margin-bottom:10px;"><strong>\u0422\u0440\u0430\u044f\u043d \u0418\u0432\u0430\u043d\u043e\u0432 \u041f\u044a\u0440\u0432\u0430\u043d\u043e\u0432</strong> \u043f\u043e\u043b\u0443\u0447\u0438 \u043e\u0442 <strong>${r.client}</strong></p><p style="font-size:11px;color:#444;margin-bottom:6px;">\u0441\u0443\u043c\u0430\u0442\u0430 \u043e\u0442:</p><div style="font-size:26px;font-weight:700;color:#1a1a1a;margin-bottom:4px;">${fmtNum(r.amount)} ${r.currency}${amtBGN}</div><p style="font-size:10px;color:#777;font-style:italic;margin-bottom:14px;">(\u0441 \u0434\u0443\u043c\u0438: ${r.amountWords})</p><p style="font-size:13px;color:#1a1a1a;margin-bottom:4px;">${verb}</p><p style="font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:14px;">${r.object}</p>${r.type==='\u0410\u0412'?remSec:''}`;
  } else if(r.type==='\u0420\u0415'){
    body=`<p style="font-size:13px;color:#444;">\u041a\u043b\u0438\u0435\u043d\u0442: <strong>${r.client}</strong></p><p style="font-size:13px;color:#444;margin-bottom:14px;">\u041e\u0431\u0435\u043a\u0442: <strong>${r.object}</strong></p><p style="font-size:10px;font-weight:700;color:#444;text-transform:uppercase;margin-bottom:6px;">\u041f\u0420\u0418\u0415\u0422\u0410 \u0414\u0415\u0419\u041d\u041e\u0421\u0422:</p><p style="font-size:13px;color:#1a1a1a;margin-bottom:14px;">${r.description||''}</p><p style="font-size:10px;font-weight:700;color:#444;text-transform:uppercase;margin-bottom:6px;">\u0421\u0422\u041e\u0419\u041d\u041e\u0421\u0422:</p><div style="font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:4px;">${fmtNum(r.amount)} ${r.currency}${amtBGN}</div><p style="font-size:10px;color:#777;font-style:italic;margin-bottom:10px;">(\u0441 \u0434\u0443\u043c\u0438: ${r.amountWords})</p>${remSec}`;
  } else if(r.type==='\u0414\u0420'){
    body=`<p style="font-size:13px;color:#444;">\u041a\u043b\u0438\u0435\u043d\u0442: <strong>${r.client}</strong></p><p style="font-size:13px;color:#444;margin-bottom:14px;">\u041e\u0431\u0435\u043a\u0442: <strong>${r.object}</strong></p><p style="font-size:10px;font-weight:700;color:#444;text-transform:uppercase;margin-bottom:6px;">\u0414\u041e\u041f\u042a\u041b\u041d\u0418\u0422\u0415\u041b\u041d\u0410 \u0414\u0415\u0419\u041d\u041e\u0421\u0422:</p><p style="font-size:13px;color:#1a1a1a;margin-bottom:14px;">${r.description||''}</p><p style="font-size:10px;font-weight:700;color:#444;text-transform:uppercase;margin-bottom:6px;">\u0414\u041e\u0413\u041e\u0412\u041e\u0420\u0415\u041d\u0410 \u0426\u0415\u041d\u0410:</p><div style="font-size:22px;font-weight:700;color:#1a1a1a;margin-bottom:4px;">${fmtNum(r.amount)} ${r.currency}</div><p style="font-size:10px;color:#777;font-style:italic;margin-bottom:10px;">(\u0441 \u0434\u0443\u043c\u0438: ${r.amountWords})</p>${r.term?`<p style="font-size:13px;color:#1a1a1a;">\u0414\u0430 \u0441\u0435 \u0438\u0437\u043f\u044a\u043b\u043d\u0438 \u0434\u043e: <strong>${r.term}</strong></p>`:''}`;
  }
  const noteB=(r.note&&r.note.trim())?`<p style="font-size:11px;color:#777;font-style:italic;margin-top:10px;">\u0417\u0430\u0431\u0435\u043b\u0435\u0436\u043a\u0430: ${r.note}</p>`:'';
  const fnB=tc.footnotes.map(fn=>`<p style="font-size:9px;color:#999;font-style:italic;margin-bottom:2px;">* ${fn}</p>`).join('');
  const html=`<div style="font-family:Arial,sans-serif;background:#fff;width:794px;min-height:1123px;padding:40px 56px;box-sizing:border-box;"><div style="display:flex;justify-content:space-between;margin-bottom:16px;"><div><div style="font-size:16px;font-weight:700;color:#1a1a1a;">IVANOV REMONTI</div><div style="font-size:10px;color:#777;margin-top:2px;">0877 810 418 \u00b7 ivanovremontibg@gmail.com \u00b7 ivanov-remonti.com</div></div></div><hr style="border:none;border-top:1px solid #999;margin-bottom:20px;"><div style="text-align:center;margin-bottom:20px;"><div style="font-size:20px;font-weight:700;color:#1a1a1a;letter-spacing:1px;">${tc.officialTitle}</div><hr style="border:none;border-top:2px solid #1a1a1a;width:200px;margin:6px auto 0;"></div><div style="text-align:center;margin-bottom:8px;font-size:12px;color:#444;">\u043a\u044a\u043c \u0414\u043e\u0433\u043e\u0432\u043e\u0440 \u2116 ${r.contractNo||'_________'} / ____________</div><div style="text-align:center;margin-bottom:20px;font-size:11px;color:#777;">\u0414\u0430\u0442\u0430: ${r.date} &nbsp;&nbsp;&nbsp; \u2116: ${r.number}</div><hr style="border:none;border-top:1px solid #ccc;margin-bottom:20px;">${body}${noteB}<div style="margin-top:10px;">${fnB}</div><hr style="border:none;border-top:1px solid #ccc;margin-top:30px;margin-bottom:20px;"><div style="display:grid;grid-template-columns:1fr 1fr;gap:40px;margin-top:10px;"><div><p style="font-size:11px;font-weight:700;color:#1a1a1a;margin-bottom:40px;">${tc.sigLeft}:</p><div style="border-bottom:1px solid #1a1a1a;margin-bottom:4px;"></div><div style="display:flex;justify-content:space-between;font-size:10px;color:#777;"><span>\u041f\u043e\u0434\u043f\u0438\u0441</span><span>\u0414\u0430\u0442\u0430: ${r.date}</span></div></div><div><p style="font-size:11px;font-weight:700;color:#1a1a1a;margin-bottom:8px;">${tc.sigRight}:</p><p style="font-size:13px;font-weight:700;color:#1a1a1a;margin-bottom:16px;">\u0422\u0440\u0430\u044f\u043d \u0418\u0432\u0430\u043d\u043e\u0432 \u041f\u044a\u0440\u0432\u0430\u043d\u043e\u0432</p><div style="border-bottom:1px solid #1a1a1a;margin-bottom:4px;"></div><div style="display:flex;justify-content:space-between;font-size:10px;color:#777;"><span>\u041f\u043e\u0434\u043f\u0438\u0441</span><span>\u0414\u0430\u0442\u0430: ${r.date}</span></div></div></div><hr style="border:none;border-top:1px solid #ccc;margin-top:40px;margin-bottom:8px;"><div style="text-align:center;font-size:9px;color:#999;">IVANOV REMONTI \u00b7 0877 810 418 \u00b7 ivanovremontibg@gmail.com</div></div>`;
  const safe=(r.client||'klient').replace(/\s+/g,'_').replace(/[^\u0400-\u04FFa-zA-Z0-9_-]/g,'');
  const el=document.createElement('div');
  el.style.cssText='position:absolute;left:0;top:-99999px;width:794px;background:#fff;';
  el.innerHTML=html;document.body.appendChild(el);
  html2pdf().set({margin:0,filename:r.number+'_'+safe+'_oficial.pdf',image:{type:'jpeg',quality:0.97},html2canvas:{scale:2,useCORS:true,backgroundColor:'#ffffff',logging:false,width:794,windowWidth:794},jsPDF:{unit:'mm',format:'a4',orientation:'portrait',compress:true}}).from(el).save().then(()=>{document.body.removeChild(el);showToast('\ud83d\udcc4 \u041e\u0444\u0438\u0446\u0438\u0430\u043b\u0435\u043d PDF \u0438\u0437\u0442\u0435\u0433\u043b\u0435\u043d.');});
}
