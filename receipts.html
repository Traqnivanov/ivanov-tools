const EUR_BGN = 1.95583;

// ── NUMBER TO WORDS (BG) ──
function numToWordsBG(n) {
  if (n === 0) return 'нула';
  const ones = ['','едно','две','три','четири','пет','шест','седем','осем','девет',
    'десет','единадесет','дванадесет','тринадесет','четиринадесет','петнадесет',
    'шестнадесет','седемнадесет','осемнадесет','деветнадесет'];
  const tens = ['','','двадесет','тридесет','четиридесет','петдесет','шестдесет','седемдесет','осемдесет','деветдесет'];
  const hundreds = ['','сто','двеста','триста','четиристотин','петстотин','шестстотин','седемстотин','осемстотин','деветстотин'];
  let r = '';
  if (n >= 1000) {
    const th = Math.floor(n / 1000);
    if (th === 1) r += 'хиляда ';
    else if (th === 2) r += 'две хиляди ';
    else if (th < 20) r += ones[th] + ' хиляди ';
    else { const t=Math.floor(th/10),o=th%10; r += tens[t]+(o?' и '+ones[o]:'')+' хиляди '; }
    n %= 1000;
  }
  if (n >= 100) { r += hundreds[Math.floor(n/100)]+' '; n%=100; if(n>0) r+='и '; }
  if (n >= 20) { r += tens[Math.floor(n/10)]; n%=10; if(n>0) r+=' и '+ones[n]; r+=' '; }
  else if (n > 0) r += ones[n]+' ';
  return r.trim();
}

function amountInWords(amount, currency) {
  const int = Math.floor(amount);
  const dec = Math.round((amount - int) * 100);
  let w = numToWordsBG(int);
  if (currency === 'EUR') { w += ' евро'; if(dec>0) w += ' и '+numToWordsBG(dec)+' цента'; }
  else { w += ' лева'; if(dec>0) w += ' и '+numToWordsBG(dec)+' стотинки'; }
  return w.charAt(0).toUpperCase() + w.slice(1);
}

function fmtNum(n) { return parseFloat(n).toFixed(2).replace('.', ','); }
function today() {
  const d = new Date();
  return String(d.getDate()).padStart(2,'0')+'.'+String(d.getMonth()+1).padStart(2,'0')+'.'+d.getFullYear();
}
function fromInputDate(d) {
  if (!d) return '';
  const p = d.split('-');
  return p[2]+'.'+p[1]+'.'+p[0];
}

// ── STATE ──
let allReceipts = [];
let filterCurrent = 'all';
let selectedId = null;
let currentType = 'АВ';

// ── FIREBASE ──
async function loadReceipts() {
  setSyncStatus('syncing');
  try {
    const { collection, getDocs } = window._fsLib;
    const snap = await getDocs(collection(window._db, 'receipts'));
    allReceipts = [];
    snap.forEach(d => allReceipts.push({id: d.id, ...d.data()}));
    allReceipts.sort((a,b) => (b.createdAt||'').localeCompare(a.createdAt||''));
    setSyncStatus('synced');
    renderList();
  } catch(e) {
    setSyncStatus('error');
    console.error(e);
  }
}

async function saveReceipt(data) {
  const { collection, doc, setDoc } = window._fsLib;
  const id = data.id || 'REC_'+Date.now();
  data.id = id;
  data.createdAt = new Date().toISOString();
  await setDoc(doc(collection(window._db,'receipts'), id), data);
  return id;
}

async function deleteReceipt(id) {
  const { collection, doc, deleteDoc } = window._fsLib;
  await deleteDoc(doc(collection(window._db,'receipts'), id));
}

function nextNumber(type) {
  const nums = allReceipts.filter(r => r.type===type).map(r => {
    const m = (r.number||'').match(/\d+$/);
    return m ? parseInt(m[0]) : 0;
  });
  const max = nums.length ? Math.max(...nums) : 0;
  return type+'-'+String(max+1).padStart(3,'0');
}

function setSyncStatus(s) {
  const el = document.getElementById('syncStatus');
  el.className = 'sync-status '+(s==='synced'?'synced':s==='syncing'?'syncing':'');
  el.textContent = s==='synced'?'✓ Синхронизирано':s==='syncing'?'⟳ Зарежда...':'⚠ Грешка';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

// ── FILTER ──
function filterType(type, btn) {
  filterCurrent = type;
  document.querySelectorAll('.type-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderList();
}

// ── RENDER LIST ──
function renderList() {
  const list = document.getElementById('receiptList');
  const items = filterCurrent==='all' ? allReceipts : allReceipts.filter(r=>r.type===filterCurrent);
  if (!items.length) {
    list.innerHTML = '<div class="empty-list">Няма бележки'+(filterCurrent!=='all'?' от тип '+filterCurrent:'')+'.</div>';
    return;
  }
  list.innerHTML = items.map(r=>`
    <div class="receipt-item${r.id===selectedId?' active':''}" onclick="selectReceipt('${r.id}')">
      <span class="type-badge b-${r.type}">${r.number||r.type}</span>
      <div class="ri-info">
        <div class="ri-name">${r.client||'—'}</div>
        <div class="ri-meta">${r.date||''}</div>
      </div>
      <div class="ri-amount">${fmtNum(r.amount)} ${r.currency}</div>
    </div>`).join('');
}

// ── SELECT ──
function selectReceipt(id) {
  selectedId = id;
  renderList();
  const r = allReceipts.find(x=>x.id===id);
  if (r) renderView(r);
}

// ── VIEW ──
function renderView(r) {
  const tc = TYPES[r.type];
  const words = r.amountWords || amountInWords(parseFloat(r.amount), r.currency);
  const bgnStr = r.currency==='EUR'
    ? `<span style="font-size:.85rem;color:var(--muted);margin-left:8px;">≈ ${fmtNum(parseFloat(r.amount)*EUR_BGN)} лв.</span>`
    : '';

  let extra = '';
  if (tc.descField && r.description) {
    extra += `<div class="view-desc-box"><div class="vg-label">${tc.descLabel}</div><div style="font-size:.9rem;margin-top:4px;">${r.description}</div></div>`;
  }
  if (tc.termField && r.term) {
    extra += `<div style="margin-bottom:12px;"><div class="vg-label">Краен срок</div><div class="vg-value">${r.term}</div></div>`;
  }
  if (r.note) {
    extra += `<div class="view-note-box"><span style="font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;display:block;margin-bottom:3px;">Забележка</span>${r.note}</div>`;
  }

  document.getElementById('rightPanel').innerHTML = `
    <div class="view-header">
      <span class="type-badge b-${r.type}" style="font-size:.75rem;padding:5px 10px;">${r.number||r.type}</span>
      <div>
        <div class="view-number">${tc.label}</div>
        <div class="view-date">${r.date||''}&nbsp;·&nbsp;Договор №: ${r.contractNo||'—'}</div>
      </div>
    </div>
    <div class="view-grid">
      <div><div class="vg-label">Клиент</div><div class="vg-value">${r.client}</div></div>
      <div><div class="vg-label">Обект / Адрес</div><div class="vg-value">${r.object}</div></div>
    </div>
    <div class="view-amount-box">
      <div class="vg-label">${tc.sumLabel}</div>
      <div class="view-amount-val">${fmtNum(r.amount)} ${r.currency}${bgnStr}</div>
      <div class="view-amount-words">${words}</div>
    </div>
    ${extra}
    <div class="divider"></div>
    <div class="action-row">
      <button class="btn-pdf-d" onclick="generateDigitalPDF('${r.id}')">🎨 Дигитален PDF</button>
      <button class="btn-pdf-o" onclick="generateOfficialPDF('${r.id}')">📄 Официален PDF</button>
      <button class="btn-del" onclick="doDelete('${r.id}')">🗑 Изтрий</button>
    </div>`;
}

// ── DELETE ──
async function doDelete(id) {
  if (!confirm('Изтриване на тази бележка?')) return;
  await deleteReceipt(id);
  allReceipts = allReceipts.filter(x=>x.id!==id);
  selectedId = null;
  renderList();
  document.getElementById('rightPanel').innerHTML = `<div class="empty-state"><div class="es-icon">📝</div><div class="es-text">Изберете бележка или създайте нова.</div></div>`;
  showToast('Бележката е изтрита.');
}

// ── FORM ──
function showForm(type) {
  selectedId = null;
  currentType = type || 'АВ';
  renderList();
  renderForm();
}

function renderForm() {
  const tc = TYPES[currentType];
  const nextNum = nextNumber(currentType);

  const typeButtons = Object.keys(TYPES).map(t=>`
    <button class="type-btn${currentType===t?' sel-'+t:''}" onclick="switchType('${t}')">
      <div class="tb-code tb-code-${t}">${t}</div>
      <div class="tb-label">${TYPES[t].label}</div>
    </button>`).join('');

  const descField = tc.descField ? `
    <div class="fg full">
      <label>${tc.descLabel}</label>
      <textarea id="fDesc" placeholder="${tc.descPlaceholder}"></textarea>
    </div>` : '';

  const termField = tc.termField ? `
    <div class="fg">
      <label>Краен срок</label>
      <input type="date" id="fTerm">
    </div>` : '<div class="fg"></div>';

  document.getElementById('rightPanel').innerHTML = `
    <div class="form-section-title">Тип бележка</div>
    <div class="type-selector">${typeButtons}</div>

    <div class="form-section-title" style="margin-top:20px;">Данни &nbsp;<span style="color:var(--gold);font-style:italic;font-size:.85rem;font-weight:400;text-transform:none;letter-spacing:0;">${nextNum}</span></div>
    <div class="form-grid">
      <div class="fg">
        <label>Клиент (три имена)</label>
        <input type="text" id="fClient" placeholder="Иван Петров Георгиев">
      </div>
      <div class="fg">
        <label>Договор №</label>
        <input type="text" id="fContract" placeholder="001 / 2026">
      </div>
      <div class="fg full">
        <label>Обект / Адрес</label>
        <input type="text" id="fObject" placeholder="бул. Витоша 48, ап. 7, София">
      </div>
      <div class="fg">
        <label>Дата</label>
        <input type="date" id="fDate" value="${new Date().toISOString().slice(0,10)}">
      </div>
      ${tc.descField ? '<div class="fg"></div>' : '<div class="fg"></div>'}
      ${descField}
      ${termField}
      <div class="fg full">
        <label>${tc.sumLabel}</label>
        <div class="amount-row">
          <input type="number" id="fAmount" placeholder="0.00" min="0" step="0.01" oninput="updateWords()">
          <select id="fCurrency" onchange="updateWords()">
            <option value="EUR">EUR</option>
            <option value="BGN">лв.</option>
          </select>
        </div>
        <div class="words-box" id="wordsBox">–</div>
      </div>
      <div class="fg full">
        <label>Забележка <span class="opt-badge">незадължително</span></label>
        <textarea id="fNote" placeholder="${tc.notePlaceholder}" style="min-height:52px;"></textarea>
      </div>
    </div>

    <div class="action-row">
      <button class="btn-save" onclick="doSave()">💾 Запази</button>
      <button class="btn-pdf-d" onclick="doSaveAndPDF('digital')">🎨 Дигитален PDF</button>
      <button class="btn-pdf-o" onclick="doSaveAndPDF('official')">📄 Официален PDF</button>
      <button onclick="cancelForm()" style="background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:10px;padding:10px 18px;font-size:.85rem;font-weight:600;cursor:pointer;font-family:inherit;">✕ Откажи</button>
    </div>`;
}

function switchType(t) { currentType = t; renderForm(); }

function cancelForm() {
  selectedId = null;
  document.getElementById('rightPanel').innerHTML = '<div style="color:var(--muted);font-size:.85rem;padding:24px 0;">Избери бележка от списъка или създай нова.</div>';
  window.scrollTo({top:0,behavior:'smooth'});
}

function updateWords() {
  const a = parseFloat(document.getElementById('fAmount').value);
  const cur = document.getElementById('fCurrency').value;
  const box = document.getElementById('wordsBox');
  if (!a || isNaN(a)) { box.textContent = '–'; return; }
  let txt = amountInWords(a, cur);
  if (cur === 'EUR') txt += '  (≈ '+fmtNum(a*EUR_BGN)+' лв.)';
  box.textContent = txt;
}

function collectFormData() {
  const client = (document.getElementById('fClient').value||'').trim();
  const object = (document.getElementById('fObject').value||'').trim();
  const amtStr = document.getElementById('fAmount').value;
  if (!client) { showToast('⚠ Въведи клиент!'); return null; }
  if (!object) { showToast('⚠ Въведи обект!'); return null; }
  if (!amtStr || parseFloat(amtStr) <= 0) { showToast('⚠ Въведи сума!'); return null; }
  const tc = TYPES[currentType];
  if (tc.descField) {
    const desc = (document.getElementById('fDesc').value||'').trim();
    if (!desc) { showToast('⚠ Въведи описание!'); return null; }
  }
  const amount = parseFloat(amtStr);
  const currency = document.getElementById('fCurrency').value;
  const data = {
    type: currentType,
    number: nextNumber(currentType),
    client, object,
    contractNo: (document.getElementById('fContract').value||'').trim(),
    date: fromInputDate(document.getElementById('fDate').value),
    amount, currency,
    amountWords: amountInWords(amount, currency),
    note: (document.getElementById('fNote').value||'').trim()
  };
  if (tc.descField) data.description = (document.getElementById('fDesc').value||'').trim();
  if (tc.termField) data.term = fromInputDate(document.getElementById('fTerm').value);
  return data;
}

async function doSave() {
  const data = collectFormData();
  if (!data) return;
  try {
    const id = await saveReceipt(data);
    data.id = id;
    allReceipts.unshift(data);
    selectedId = id;
    renderList();
    renderView(data);
    showToast('✓ Запазено — '+data.number);
  } catch(e) { showToast('Грешка при запис!'); console.error(e); }
}

async function doSaveAndPDF(pdfType) {
  const data = collectFormData();
  if (!data) return;
  try {
    const id = await saveReceipt(data);
    data.id = id;
    allReceipts.unshift(data);
    selectedId = id;
    renderList();
    renderView(data);
    if (pdfType === 'digital') generateDigitalPDF(id);
    else generateOfficialPDF(id);
  } catch(e) { showToast('Грешка!'); console.error(e); }
}

// ── DIGITAL PDF ──
function generateDigitalPDF(id) {
  const r = allReceipts.find(x=>x.id===id);
  if (!r) return;
  const tc = TYPES[r.type];
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:'mm', format:'a4'});
  const W=210, M=14, cW=W-M*2, F='helvetica';
  const DARK='#141c2b', GOLD='#e9a825', MUTED='#6b85a0', WHITE='#ffffff';
  const LIGHT='#f8fafc', BORDER='#d5e0ea', GOLD_MID='#c8891a', GOLD_LITE='#fffbf0';
  const TYPE_COLORS={АВ:'#1a7a52',РМ:'#1a5fa8',РЕ:'#6b21a8',ДР:'#c84b00'};
  const TYPE_BKGS={АВ:'#e6f7ef',РМ:'#e8f1fb',РЕ:'#f3e8ff',ДР:'#fff0e6'};
  const col=c=>doc.setTextColor(c);
  const fill=c=>doc.setFillColor(c);
  const drw=c=>doc.setDrawColor(c);
  const lw=n=>doc.setLineWidth(n);

  // HEADER
  fill(DARK); doc.rect(0,0,W,33,'F');
  fill(GOLD_MID); doc.rect(0,32.5,W,0.5,'F');
  doc.setFont(F,'bold'); doc.setFontSize(22); col(WHITE); doc.text('IVANOV',M,18);
  const iW = doc.getTextWidth('IVANOV ');
  col(GOLD); doc.text('REMONTI',M+iW,18);
  doc.setFont(F,'normal'); doc.setFontSize(7); col(MUTED);
  doc.text('СТРОИТЕЛНИ УСЛУГИ · СОФИЯ И РЕГИОН',M,24.5);
  doc.setFontSize(7.5); col(MUTED);
  doc.text('0877 810 418',W-M,13,{align:'right'});
  doc.text('ivanovremontibg@gmail.com',W-M,19,{align:'right'});
  doc.text('ivanov-remonti.com',W-M,25,{align:'right'});

  // TYPE BAR
  const tColor=TYPE_COLORS[r.type], tBkg=TYPE_BKGS[r.type];
  fill(tBkg); doc.rect(M,36,cW,10,'F');
  fill(tColor); doc.rect(M,36,3,10,'F');
  doc.setFont(F,'bold'); doc.setFontSize(10); col(tColor);
  doc.text(tc.officialTitle, M+7, 42.5);
  doc.setFont(F,'normal'); doc.setFontSize(8); col(MUTED);
  doc.text(r.number+'  ·  '+r.date, W-M, 42.5, {align:'right'});

  let y = 52;

  // INFO
  fill(LIGHT); drw(BORDER); lw(0.3); doc.roundedRect(M,y,cW,24,2,2,'FD');
  fill(tColor); doc.roundedRect(M,y,3,24,1,1,'F');
  const LX=M+8, VX=M+42, C2=M+cW/2+6;
  doc.setFont(F,'normal'); doc.setFontSize(7); col(MUTED);
  doc.text('КЛИЕНТ',LX,y+8); doc.text('ДОГОВОР №',LX,y+16); doc.text('ОБЕКТ / АДРЕС',C2,y+8);
  doc.setFont(F,'bold'); doc.setFontSize(9.5); col(DARK); doc.text(r.client||'—',VX,y+8);
  doc.setFont(F,'normal'); doc.setFontSize(8.5); col(DARK);
  doc.text(r.contractNo||'—',VX,y+16);
  doc.text(doc.splitTextToSize(r.object||'—',cW/2-10),C2+22,y+8);
  y+=30;

  // DESCRIPTION
  if (tc.descField && r.description) {
    const dLines = doc.splitTextToSize(r.description, cW-16);
    const dH = 12 + dLines.length*5;
    fill('#f0f4f8'); drw(BORDER); lw(0.3); doc.roundedRect(M,y,cW,dH,2,2,'FD');
    fill(MUTED); doc.roundedRect(M,y,3,dH,1,1,'F');
    doc.setFont(F,'bold'); doc.setFontSize(7); col(MUTED);
    doc.text(tc.descLabel.toUpperCase(),M+8,y+6);
    doc.setFont(F,'normal'); doc.setFontSize(8.5); col(DARK);
    doc.text(dLines,M+8,y+11);
    y += dH+6;
  }

  // AMOUNT
  const amtBGN = r.currency==='EUR' ? ' / '+fmtNum(parseFloat(r.amount)*EUR_BGN)+' лв.' : '';
  fill(GOLD_LITE); drw(GOLD_MID); lw(0.4); doc.roundedRect(M,y,cW,24,2,2,'FD');
  fill(GOLD_MID); doc.roundedRect(M,y,3,24,1,1,'F');
  doc.setFont(F,'bold'); doc.setFontSize(7); col(MUTED);
  doc.text(tc.sumLabel.toUpperCase(),M+8,y+7);
  doc.setFont(F,'bold'); doc.setFontSize(16); col(DARK);
  doc.text(fmtNum(r.amount)+' '+r.currency+amtBGN,M+8,y+17);
  doc.setFont(F,'italic'); doc.setFontSize(7.5); col(MUTED);
  doc.text('С думи: '+r.amountWords,M+8,y+23);
  y+=30;

  // TERM
  if (tc.termField && r.term) {
    fill(LIGHT); drw(BORDER); lw(0.3); doc.roundedRect(M,y,cW,10,2,2,'FD');
    doc.setFont(F,'normal'); doc.setFontSize(7.5); col(MUTED); doc.text('КРАЕН СРОК',M+8,y+7);
    doc.setFont(F,'bold'); col(DARK); doc.text(r.term,M+50,y+7);
    y+=16;
  }

  // NOTE
  if (r.note && r.note.trim()) {
    const nLines = doc.splitTextToSize(r.note, cW-16);
    const nH = 10+nLines.length*5+4;
    fill(GOLD_LITE); drw(GOLD_MID); lw(0.3); doc.roundedRect(M,y,cW,nH,2,2,'FD');
    fill(GOLD_MID); doc.roundedRect(M,y,3,nH,1,1,'F');
    doc.setFont(F,'bold'); doc.setFontSize(7); col(MUTED); doc.text('ЗАБЕЛЕЖКА',M+8,y+6);
    doc.setFont(F,'normal'); doc.setFontSize(8.5); col(DARK); doc.text(nLines,M+8,y+11);
    y+=nH+6;
  }

  // SIGNATURES
  const sigW=(cW-10)/2, sigH=32, sigY=y;
  // LEFT
  fill(LIGHT); drw(BORDER); lw(0.3); doc.roundedRect(M,sigY,sigW,sigH,2,2,'FD');
  fill(tColor); doc.roundedRect(M,sigY,3,sigH,1,1,'F');
  doc.setFont(F,'bold'); doc.setFontSize(7); col(MUTED); doc.text(tc.sigLeft,M+8,sigY+7);
  drw(DARK); lw(0.4); doc.line(M+8,sigY+24,M+sigW-6,sigY+24);
  doc.setFont(F,'normal'); doc.setFontSize(7); col(MUTED); doc.text('Подпис',M+8,sigY+29);
  doc.setFont(F,'bold'); col(DARK); doc.text(r.date||'',M+sigW-6,sigY+29,{align:'right'});
  // RIGHT
  const s2X = M+sigW+10;
  fill(LIGHT); drw(BORDER); lw(0.3); doc.roundedRect(s2X,sigY,sigW,sigH,2,2,'FD');
  fill(DARK); doc.roundedRect(s2X,sigY,3,sigH,1,1,'F');
  doc.setFont(F,'bold'); doc.setFontSize(7); col(MUTED); doc.text(tc.sigRight,s2X+8,sigY+7);
  doc.setFont(F,'bold'); doc.setFontSize(9); col(DARK); doc.text('Траян Иванов Първанов',s2X+8,sigY+14);
  drw(DARK); lw(0.4); doc.line(s2X+8,sigY+24,s2X+sigW-6,sigY+24);
  doc.setFont(F,'normal'); doc.setFontSize(7); col(MUTED); doc.text('Подпис',s2X+8,sigY+29);
  doc.setFont(F,'bold'); col(DARK); doc.text(r.date||'',s2X+sigW-6,sigY+29,{align:'right'});
  y += sigH+10;

  // FOOTER LINE
  fill(GOLD_MID); doc.rect(M,y,cW,0.5,'F'); y+=5;
  doc.setFont(F,'normal'); doc.setFontSize(7); col(MUTED);
  doc.text('Генерирано: '+today(),M,y);
  doc.text('Работим с договор и писмена гаранция · ivanov-remonti.com',W-M,y,{align:'right'});

  const safe=(r.client||'klient').replace(/\s+/g,'_').replace(/[^\u0400-\u04FFa-zA-Z0-9_-]/g,'');
  doc.save(r.number+'_'+safe+'_digital.pdf');
  showToast('🎨 Дигитален PDF изтеглен.');
}

    const dL=doc.splitTextToSize(r.description||'',cW);
    doc.text(dL,M,y); y+=dL.length*6+8;
    doc.setFont(F,'bold'); doc.setFontSize(8); col(MID); doc.text('СТОЙНОСТ:',M,y); y+=6;
    doc.setFont(F,'bold'); doc.setFontSize(16); col(DARK);
    const amtBGN2=r.currency==='EUR'?' / '+fmtNum(parseFloat(r.amount)*EUR_BGN)+' лв.':'';
    doc.text(fmtNum(r.amount)+' '+r.currency+amtBGN2,M,y); y+=8;
    doc.setFont(F,'italic'); doc.setFontSize(8.5); col(MID);
    doc.text('(с думи: '+r.amountWords+')',M,y); y+=8;

  } else if (r.type==='ДР') {
    doc.setFont(F,'normal'); doc.setFontSize(10); col(MID); doc.text('Клиент:',M,y);
    doc.setFont(F,'bold'); col(DARK); doc.text(r.client,M+24,y); y+=8;
    doc.setFont(F,'normal'); col(MID); doc.text('Обект:',M,y);
    doc.setFont(F,'bold'); col(DARK); doc.text(r.object,M+24,y); y+=12;
    doc.setFont(F,'bold'); doc.setFontSize(8); col(MID); doc.text('ДОПЪЛНИТЕЛНА ДЕЙНОСТ:',M,y); y+=6;
    doc.setFont(F,'normal'); doc.setFontSize(10); col(DARK);
    const dL2=doc.splitTextToSize(r.description||'',cW);
    doc.text(dL2,M,y); y+=dL2.length*6+8;
    doc.setFont(F,'bold'); doc.setFontSize(8); col(MID); doc.text('ДОГОВОРЕНА ЦЕНА:',M,y); y+=6;
    doc.setFont(F,'bold'); doc.setFontSize(16); col(DARK);
    doc.text(fmtNum(r.amount)+' '+r.currency,M,y); y+=8;
    doc.setFont(F,'italic'); doc.setFontSize(8.5); col(MID);
    doc.text('(с думи: '+r.amountWords+')',M,y); y+=10;
    if (r.term) {
      doc.setFont(F,'normal'); doc.setFontSize(10); col(DARK);
      doc.text('Да се изпълни до:  '+r.term,M,y); y+=8;
    }
  }

  // NOTE
  if (r.note && r.note.trim()) {
    y+=4;
    doc.setFont(F,'italic'); doc.setFontSize(8.5); col(MID);
    const nL=doc.splitTextToSize('Забележка: '+r.note,cW);
    doc.text(nL,M,y); y+=nL.length*5+6;
  }

  // FOOTNOTES
  y+=4;
  tc.footnotes.forEach(fn=>{
    doc.setFont(F,'italic'); doc.setFontSize(7.5); col(LIGHT);
    doc.text('* '+fn,M,y); y+=5;
  });

  y+=10;
  drw(BORDER); lw(0.3); doc.line(M,y,W-M,y); y+=12;

  // SIGNATURES
  const colW=(cW-10)/2;
  doc.setFont(F,'bold'); doc.setFontSize(8); col(DARK);
  doc.text(tc.sigLeft+':',M,y); doc.text(tc.sigRight+':',M+colW+10,y); y+=8;
  doc.setFont(F,'normal'); doc.setFontSize(9); col(MID);
  doc.text('.........................................',M,y);
  doc.setFont(F,'bold'); col(DARK); doc.text('Траян Иванов Първанов',M+colW+10,y); y+=8;
  doc.setFont(F,'normal'); doc.setFontSize(8); col(MID);
  doc.text('Подпис: .................................',M,y);
  doc.text('Подпис: .................................',M+colW+10,y); y+=7;
  doc.text('Дата:    '+r.date,M,y);
  doc.text('Дата:    '+r.date,M+colW+10,y);

  // PAGE FOOTER
  drw(BORDER); lw(0.3); doc.line(M,280,W-M,280);
  doc.setFont(F,'normal'); doc.setFontSize(7); col(LIGHT);
  doc.text('IVANOV REMONTI  ·  0877 810 418  ·  ivanovremontibg@gmail.com',W/2,285,{align:'center'});

  const safe=(r.client||'klient').replace(/\s+/g,'_').replace(/[^\u0400-\u04FFa-zA-Z0-9_-]/g,'');
  doc.save(r.number+'_'+safe+'_oficial.pdf');
  showToast('📄 Официален PDF изтеглен.');
}

  if (window._firebaseReady) loadReceipts();

window.filterType=filterType;

window.updateWords=updateWords;
window.doSave=doSave;
window.doSaveAndPDF=doSaveAndPDF;
window.generateDigitalPDF=generateDigitalPDF;
window.generateOfficialPDF=generateOfficialPDF;
window.doDelete=doDelete;
