<!DOCTYPE html>
<html lang="bg">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Калкулатор ГК + Шпакловка</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  background: #0f172a;
  background-image: radial-gradient(circle at 20% 30%, rgba(217,164,65,0.08) 0%, transparent 50%),
                    radial-gradient(circle at 80% 70%, rgba(217,164,65,0.05) 0%, transparent 50%);
  min-height: 100vh; padding: 15px; color: #e2e8f0;
}
.main { display: flex; gap: 18px; max-width: 1320px; margin: 0 auto; flex-wrap: wrap; }
.left { flex: 1 1 640px; background: #1e293b; border: 1px solid #334155; border-radius: 18px; padding: 22px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
.right { flex: 0 0 430px; background: #1e293b; border: 1px solid #334155; border-radius: 18px; padding: 20px; position: sticky; top: 15px; max-height: 94vh; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
h1 { font-size: 1.4rem; color: #d9a441; margin-bottom: 4px; display: flex; align-items: center; gap: 10px; }
.sub { font-size: 0.85rem; color: #94a3b8; margin-bottom: 14px; }
.row { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-bottom: 12px; }
.row label { font-weight: 600; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; color: #cbd5e1; }
input, select { padding: 9px 11px; border: 1px solid #475569; border-radius: 8px; font-size: 0.9rem; background: #0f172a; color: #e2e8f0; transition: border 0.2s; }
input:focus, select:focus { border-color: #d9a441; outline: none; box-shadow: 0 0 0 2px rgba(217,164,65,0.2); }
input[type="number"] { width: 80px; }
input[type="text"] { width: 170px; }
.mkbtn { background:#1e293b;color:#64748b;border:1px solid #334155;border-radius:6px;padding:4px 8px;font-size:0.75rem;font-weight:700;cursor:pointer;transition:all 0.15s;box-shadow:none;transform:none !important; }
.mkbtn:hover { border-color:#64748b;color:#cbd5e1;box-shadow:none !important; }
.mkbtn.active { background:#334155;color:#e2e8f0;border-color:#64748b;box-shadow:none !important; }
.card { background: #0f172a; border: 1px solid #334155; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.card h2 { font-size: 1rem; margin-bottom: 12px; color: #d9a441; display: flex; align-items: center; gap: 8px; font-weight: 600; }
.mat-checks { display: flex; flex-wrap: wrap; gap: 8px; }
.mat-checks label { font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; padding: 6px 10px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; font-size: 0.85rem; transition: all 0.15s; }
.mat-checks label:hover { border-color: #d9a441; }
.mat-checks input[type="checkbox"] { accent-color: #d9a441; }

/* TAB */
.tab-switcher { display: flex; margin-bottom: 18px; background: #0f172a; border-radius: 12px; padding: 4px; border: 1px solid #334155; }
.tab-btn { flex: 1; padding: 10px; border: none; border-radius: 9px; font-weight: 700; font-size: 0.9rem; cursor: pointer; transition: all 0.2s; background: transparent; color: #64748b; box-shadow: none; transform: none !important; }
.tab-btn:hover { color: #cbd5e1; background: #1e293b; box-shadow: none !important; }
.tab-btn.active { background: linear-gradient(135deg, #d9a441, #b8862d); color: #0f172a; box-shadow: 0 2px 8px rgba(217,164,65,0.3) !important; }
.tab-section { display: none; }
.tab-section.active { display: block; }

/* ROOMS */
.room { background: #0f172a; border: 1px solid #334155; padding: 16px; border-radius: 14px; margin-bottom: 14px; animation: fadeIn 0.25s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);} }
.room-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 10px; }
.room-header .title-input { flex: 1; max-width: none; width: auto; }
.room-badge { font-size: 0.7rem; padding: 4px 10px; border-radius: 20px; font-weight: 700; letter-spacing: 0.5px; flex-shrink: 0; }
.badge-room  { background: #1e40af; color: #dbeafe; }
.badge-part  { background: #7e22ce; color: #f3e8ff; }
.badge-putty { background: #7c2d12; color: #fed7aa; }
.remove-room { background: #7f1d1d; color: #fecaca; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 0.9rem; transition: 0.15s; flex-shrink: 0; }
.remove-room:hover { background: #b91c1c; color: #fff; }

/* GK CEILING */
.ceil-card { background: #1e293b; border: 2px solid #334155; border-radius: 12px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; margin: 14px 0; cursor: pointer; transition: all 0.2s; user-select: none; }
.ceil-card.disabled { opacity: 0.4; cursor: not-allowed; }
.ceil-card:hover:not(.disabled) { border-color: #64748b; }
.ceil-card.active { background: linear-gradient(135deg, #3d2f0f, #5a4418); border-color: #d9a441; box-shadow: 0 0 0 1px #d9a441, 0 4px 12px rgba(217,164,65,0.25); }
.ceil-card .left-side { display: flex; align-items: center; gap: 10px; }
.ceil-card .icon { font-size: 1.6rem; }
.ceil-card .title { font-weight: 700; color: #cbd5e1; }
.ceil-card.active .title { color: #f5d581; }
.ceil-card .area { font-size: 0.85rem; color: #94a3b8; }
.ceil-card.active .area { color: #f5d581; font-weight: 600; }
.ceil-card .check-indicator { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #475569; display: flex; align-items: center; justify-content: center; font-weight: bold; color: transparent; transition: 0.2s; }
.ceil-card.active .check-indicator { background: #d9a441; border-color: #d9a441; color: #0f172a; }
.ceil-card.active .check-indicator::before { content: '✓'; }

/* PUTTY CEILING stack */
.pceil-stack { margin: 14px 0; display: flex; flex-direction: column; gap: 4px; }
.pceil-card { border-radius: 12px; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: all 0.2s; user-select: none; border: 2px solid #334155; background: #1e293b; }
.pceil-card.disabled { opacity:0.4; cursor:not-allowed; }
.pceil-card:hover:not(.disabled) { border-color: #64748b; }
.pceil-card .pleft { display: flex; align-items: center; gap: 10px; }
.pceil-card .picon { font-size: 1.2rem; }
.pceil-card .ptitle { font-weight: 700; font-size: 0.85rem; }
.pceil-card .parea { font-size: 0.78rem; color: #94a3b8; margin-left: 8px; }
.pceil-card .psvc { font-size: 0.72rem; font-weight: 700; padding: 3px 8px; border-radius: 5px; }
.pceil-add-row { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
.pceil-plus { width: 18px; height: 18px; border-radius: 50%; background: #d9a441; color: #0f172a; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; border: none; line-height: 1; }

/* SCHEMA */
.schema-label { font-size: 0.85rem; color: #94a3b8; margin: 14px 0 4px; font-weight: 500; }
.schema-hint  { font-size: 0.72rem; color: #64748b; margin-bottom: 8px; font-style: italic; }
.schema-wrap  { display: flex; justify-content: center; padding: 55px 28px 28px; background: #0a0f1c; border-radius: 12px; border: 1px dashed #334155; margin-bottom: 10px; min-height: 120px; align-items: center; overflow: visible; }
.schema-wrap.empty { color: #475569; font-size: 0.85rem; font-style: italic; }
.schema { position: relative; background: repeating-linear-gradient(45deg, #1e293b, #1e293b 4px, #162033 4px, #162033 8px); border: 1px solid #475569; border-radius: 4px; }

/* GK wall states */
.wall-btn { position: absolute; background: #1e293b; border: 2px solid #475569; border-radius: 6px; cursor: pointer; transition: all 0.2s; display: flex; flex-direction: column; align-items: center; justify-content: center; user-select: none; color: #94a3b8; overflow: visible; }
.wall-reset { position: absolute; width: 14px; height: 14px; border-radius: 50%; background: #7f1d1d; border: none; color: #fecaca; font-size: 9px; font-weight: 900; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 20; line-height: 1; padding: 0; top: -5px; left: -5px; right: auto; }
.wall-btn.active-wall .wall-reset { display: flex; }
.wall-extra .wall-reset { display: flex; }
.wall-reset:hover { background: #b91c1c; }
.wall-btn:hover { border-color: #64748b; color: #cbd5e1; transform: scale(1.02); }
.wall-btn .dim   { font-size: 0.62rem; font-weight: 600; opacity: 0.85; }
.wall-btn .m2    { font-size: 0.68rem; font-weight: 700; margin-top: 1px; }
.wall-btn .state { font-size: 0.58rem; font-weight: 800; letter-spacing: 0.3px; margin-top: 2px; padding: 1px 4px; border-radius: 3px; text-transform: uppercase; line-height: 1.3; text-align:center; }
.wall-btn.s-wall { background: linear-gradient(135deg,#3d2f0f,#5a4418); border-color:#d9a441; color:#f5d581; box-shadow:0 0 0 1px #d9a441,0 2px 8px rgba(217,164,65,.25); }
.wall-btn.s-wall .state { background:#d9a441;color:#0f172a; }
.wall-btn.s-glue { background: linear-gradient(135deg,#0f2a1a,#14532d); border-color:#16a34a; color:#a7f3d0; box-shadow:0 0 0 1px #16a34a,0 2px 8px rgba(22,163,74,.25); }
.wall-btn.s-glue .state { background:#16a34a;color:#0f172a; }

/* PUTTY wall states */
.wall-btn.ps-osnovna { background:linear-gradient(135deg,#451a03,#78350f); border-color:#d97706; color:#fde68a; box-shadow:0 0 0 1px #d97706,0 2px 8px rgba(217,119,6,.25); }
.wall-btn.ps-osnovna .state { background:#d97706;color:#0f172a; }
.wall-btn.ps-gipsova { background:linear-gradient(135deg,#022c22,#064e3b); border-color:#10b981; color:#a7f3d0; box-shadow:0 0 0 1px #059669,0 2px 8px rgba(16,185,129,.25); }
.wall-btn.ps-gipsova .state { background:#059669;color:#0f172a; }
.wall-btn.ps-gipsova_mesh { background:linear-gradient(135deg,#022c22,#065f46); border-color:#34d399; color:#6ee7b7; box-shadow:0 0 0 1px #34d399,0 2px 8px rgba(52,211,153,.3); }
.wall-btn.ps-gipsova_mesh .state { background:#34d399;color:#0f172a; }
.wall-btn.ps-fina { background:linear-gradient(135deg,#2e1065,#4c1d95); border-color:#a78bfa; color:#ddd6fe; box-shadow:0 0 0 1px #7c3aed,0 2px 8px rgba(124,58,237,.25); }
.wall-btn.ps-fina .state { background:#7c3aed;color:#fff; }
.wall-btn.ps-fugi { background:linear-gradient(135deg,#0c1a3a,#1e3a5f); border-color:#60a5fa; color:#bfdbfe; box-shadow:0 0 0 1px #2563eb,0 2px 8px rgba(37,99,235,.25); }
.wall-btn.ps-fugi .state { background:#2563eb;color:#fff; }

/* Putty ceiling card service colors */
.pceil-card.ps-osnovna { background:linear-gradient(135deg,#451a03,#78350f); border-color:#d97706; }
.pceil-card.ps-osnovna .ptitle { color:#fde68a; }
.pceil-card.ps-osnovna .psvc { background:#d97706;color:#0f172a; }
.pceil-card.ps-gipsova { background:linear-gradient(135deg,#022c22,#064e3b); border-color:#059669; }
.pceil-card.ps-gipsova .ptitle { color:#a7f3d0; }
.pceil-card.ps-gipsova .psvc { background:#059669;color:#0f172a; }
.pceil-card.ps-gipsova_mesh { background:linear-gradient(135deg,#022c22,#065f46); border-color:#34d399; }
.pceil-card.ps-gipsova_mesh .ptitle { color:#6ee7b7; }
.pceil-card.ps-gipsova_mesh .psvc { background:#34d399;color:#0f172a; }
.pceil-card.ps-fina { background:linear-gradient(135deg,#2e1065,#4c1d95); border-color:#7c3aed; }
.pceil-card.ps-fina .ptitle { color:#ddd6fe; }
.pceil-card.ps-fina .psvc { background:#7c3aed;color:#fff; }
.pceil-card.ps-fugi { background:linear-gradient(135deg,#0c1a3a,#1e3a5f); border-color:#2563eb; }
.pceil-card.ps-fugi .ptitle { color:#bfdbfe; }
.pceil-card.ps-fugi .psvc { background:#2563eb;color:#fff; }

.room-center { position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#475569;font-size:0.75rem;font-weight:600;text-align:center;pointer-events:none; }
.room-center .dims { color:#64748b;font-size:0.7rem;margin-top:2px; }
.wall-legend { display:flex;gap:10px;font-size:0.7rem;color:#94a3b8;margin-top:10px;justify-content:center;flex-wrap:wrap; }

/* Wall stacks — multiple service layers per wall */
.wall-stack-h { display:flex;flex-direction:column;gap:4px;align-items:flex-start; }
.wall-stack-v { display:flex;flex-direction:row;gap:4px;align-items:flex-start; }
.wall-plus { width:18px;height:18px;border-radius:50%;background:#d9a441;color:#0f172a;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;line-height:1;flex-shrink:0;transition:0.15s; }
.wall-plus:hover { background:#f59e0b; }
.wall-plus.disabled { opacity:0.2;cursor:default;pointer-events:none; }
.wall-legend span { display:inline-flex;align-items:center;gap:4px; }
.legend-dot { width:9px;height:9px;border-radius:2px;border:1.5px solid; }
.legend-dot.off      { background:#1e293b;border-color:#475569; }
.legend-dot.wall     { background:#5a4418;border-color:#d9a441; }
.legend-dot.glue     { background:#14532d;border-color:#16a34a; }
.legend-dot.osnovna  { background:#78350f;border-color:#d97706; }
.legend-dot.gipsova  { background:#064e3b;border-color:#059669; }
.legend-dot.gip_mesh { background:#065f46;border-color:#34d399; }
.legend-dot.fina     { background:#4c1d95;border-color:#7c3aed; }
.legend-dot.fugi     { background:#1e3a5f;border-color:#2563eb; }

/* LAYERS TABLE */
.layers-table-wrap { margin-top: 12px; background: #0a0f1c; border-radius: 10px; border: 1px solid #1e293b; overflow: hidden; }
.layers-table-wrap.empty { display: none; }
.layers-header { font-size: 0.72rem; font-weight: 700; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; padding: 6px 10px; border-bottom: 1px solid #1e293b; }
.layers-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-bottom: 1px solid #0f172a; }
.layers-row:last-child { border-bottom: none; }
.layers-name { flex: 1; font-size: 0.82rem; color: #cbd5e1; }
.layers-area { font-size: 0.75rem; color: #64748b; white-space: nowrap; }
.layers-btns { display: flex; gap: 3px; flex-shrink: 0; }
.lbtn { width: 28px; height: 28px; border-radius: 6px; border: 1.5px solid #334155; background: #1e293b; color: #64748b; font-weight: 700; font-size: 0.8rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; box-shadow: none; transform: none !important; padding: 0; }
.lbtn:hover { border-color: #d9a441; color: #d9a441; box-shadow: none !important; }
.lbtn.active { background: #d9a441; border-color: #d9a441; color: #0f172a; box-shadow: none !important; }

/* BUTTONS */
.add-buttons { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
.add-buttons button { background:#334155;color:#cbd5e1;box-shadow:none;font-size:0.85rem;padding:10px 14px; }
.add-buttons button:hover { background:#d9a441;color:#0f172a; }
.add-buttons button.primary { background:linear-gradient(135deg,#d9a441,#b8862d);color:#0f172a;box-shadow:0 2px 8px rgba(217,164,65,0.2); }
button { background:linear-gradient(135deg,#d9a441,#b8862d);color:#0f172a;border:none;padding:11px 20px;border-radius:10px;font-weight:700;cursor:pointer;transition:0.2s;display:inline-flex;align-items:center;gap:8px;font-size:0.9rem;box-shadow:0 2px 8px rgba(217,164,65,0.2); }
button:hover { transform:translateY(-1px);box-shadow:0 4px 12px rgba(217,164,65,0.35); }
button.sec { background:#334155;color:#cbd5e1;box-shadow:none; }
button.sec:hover { background:#475569; }
.simple-input-row { background:#1e293b;padding:12px;border-radius:10px;border:1px solid #334155; }

/* RIGHT PANEL */
.panel-title { font-size:1.1rem;color:#d9a441;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid #334155;font-weight:600; }
.summary-box { background:linear-gradient(135deg,#3d2f0f,#5a4418);border:1px solid #d9a441;padding:12px 14px;border-radius:10px;margin-bottom:14px;color:#f5d581;font-size:0.85rem;line-height:1.5; }
.summary-box strong { color:#fff;font-size:1rem;display:block;margin-bottom:4px; }
.section-divider { font-size:0.78rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:0.8px;margin:16px 0 8px;padding-bottom:4px;border-bottom:1px solid #1e293b; }
.mat-group { margin-bottom:10px;border-radius:10px;overflow:hidden;border:1px solid #334155; }
.mat-group-header { padding:8px 12px;font-size:0.78rem;font-weight:700;text-transform:uppercase;letter-spacing:0.6px;color:#fff;display:flex;align-items:center;gap:6px; }
.g-boards .mat-group-header { background:#1e40af; }
.g-struct .mat-group-header { background:#c2410c; }
.g-fix    .mat-group-header { background:#b91c1c; }
.g-finish .mat-group-header { background:#15803d; }
.g-extra  .mat-group-header { background:#7e22ce; }
.g-osnovna .mat-group-header { background:#92400e; }
.g-gipsova .mat-group-header { background:#065f46; }
.g-fina    .mat-group-header { background:#4c1d95; }
.g-fugi    .mat-group-header { background:#1e3a5f; }
.g-custom  .mat-group-header { background:#1e3a5f; background:linear-gradient(135deg,#1a3a2a,#0f4a2f); }
.custom-mat-row { display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid #1e293b; }
.custom-mat-row:last-child { border-bottom:none; }
.custom-mat-row input[type="text"] { flex:1;min-width:0;width:auto; }
.custom-mat-row input[type="number"] { width:75px; }
.custom-remove { background:#7f1d1d;color:#fecaca;border:none;border-radius:50%;width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:bold;font-size:0.85rem;transition:0.15s;flex-shrink:0;box-shadow:none;transform:none !important;padding:0; }
.custom-remove:hover { background:#b91c1c;box-shadow:none !important; }
.mat-group table { width:100%;border-collapse:collapse;background:#0f172a; }
.mat-group tr:hover td { background:#1a2535; }
.mat-group tr:last-child td { border-bottom:none; }
.mat-group td { padding:8px 10px;border-bottom:1px solid #1e293b;font-size:0.84rem;color:#cbd5e1;vertical-align:middle; }
td.col-pkg { text-align:right;font-weight:700;white-space:nowrap; }
td.col-pkg .n { color:#d9a441;font-size:0.95rem; }
td.col-pkg .u { color:#94a3b8;font-size:0.8rem;margin-left:3px; }
td.col-raw { text-align:right;color:#64748b;font-size:0.78rem;white-space:nowrap;font-family:"SF Mono",Consolas,monospace;min-width:60px; }
td.col-edit { width:26px;text-align:center;padding:4px 5px; }
.edit-btn { background:none;border:none;color:#475569;cursor:pointer;font-size:0.75rem;padding:3px 4px;border-radius:4px;transition:0.15s;display:inline-flex;align-items:center;box-shadow:none;transform:none !important; }
.edit-btn:hover { color:#d9a441;background:#1e293b;box-shadow:none !important; }
.qty-edit { width:65px;padding:3px 6px;font-size:0.82rem;background:#0f172a;border:1px solid #d9a441;color:#d9a441;border-radius:5px;text-align:right;font-family:"SF Mono",Consolas,monospace; }
.qty-edit:focus { outline:none; }
tr.overridden td.col-name::after { content:' ✎';font-size:0.6rem;color:#f59e0b;vertical-align:super; }
tr.overridden td.col-pkg .n { color:#f59e0b; }
.override-note { font-size:0.72rem;color:#f59e0b;text-align:right;margin-top:6px;display:none; }
.override-note.on { display:block; }
.waste-note { text-align:right;font-size:0.72rem;color:#64748b;margin-top:8px;font-style:italic; }
.action-row { display:flex;gap:8px;margin-top:16px;flex-wrap:wrap; }
.empty-state { text-align:center;padding:40px 20px;color:#64748b; }
.empty-state .big-icon { font-size:3rem;display:block;margin-bottom:10px;opacity:0.4; }

/* Positions summary table */
.pos-table-wrap { margin: 8px 0 4px; background: #0a0f1c; border-radius: 10px; border: 1px solid #1e293b; overflow: hidden; }
.pos-table-wrap table { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
.pos-table-wrap th { color: #64748b; font-weight: 600; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.5px; padding: 5px 8px; border-bottom: 1px solid #1e293b; text-align: left; }
.pos-table-wrap td { padding: 4px 8px; border-bottom: 1px solid #0f172a; color: #cbd5e1; }
.pos-table-wrap tr:last-child td { border-bottom: none; }
.pos-table-wrap td.col-m2 { text-align: right; color: #94a3b8; white-space: nowrap; font-family: "SF Mono",Consolas,monospace; font-size: 0.75rem; }
.pos-svc-pill { display: inline-block; font-size: 0.62rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; margin-left: 4px; vertical-align: middle; }
.p-osnovna-pill { background:#d97706;color:#0f172a; }

function addCustomMat(){
  const id=cmId++;
  customMats.push({id,name:'',unitPrice:0,qty:1});
  renderCustomMats();
  renderResults();
}
function removeCustomMat(id){
  customMats=customMats.filter(m=>m.id!==id);
  renderCustomMats();
  renderResults();
}
function updateCustomMat(id,field,val){
  const m=customMats.find(m=>m.id===id);
  if(!m) return;
  if(field==='name') m.name=val;
  else if(field==='unitPrice') m.unitPrice=parseFloat(val)||0;
  else if(field==='qty') m.qty=parseFloat(val)||0;
  renderResults();
}
function renderCustomMats(){
  const c=document.getElementById('customMatsContainer');
  if(!c) return;
  if(customMats.length===0){c.innerHTML='';return;}
  c.innerHTML=customMats.map(m=>`
    <div class="custom-mat-row">
      <input type="text" placeholder="Материал" value="${m.name.replace(/"/g,'&quot;')}" oninput="updateCustomMat(${m.id},'name',this.value)" style="flex:2;min-width:0;">
      <input type="number" placeholder="€/бр" value="${m.unitPrice||''}" min="0" step="0.01" oninput="updateCustomMat(${m.id},'unitPrice',this.value)" title="Единична цена €">
      <input type="number" placeholder="Кол." value="${m.qty||''}" min="0" step="1" oninput="updateCustomMat(${m.id},'qty',this.value)" title="Количество">
      <button class="custom-remove" onclick="removeCustomMat(${m.id})">✕</button>
    </div>`).join('');
}
function calcCustomTotal(){
  return customMats.reduce((s,m)=>s+(m.unitPrice||0)*(m.qty||0)*MARKUP,0);
}

function toggleGKCeil(el){
  if(el.classList.contains('disabled')) return;
  const on=el.dataset.on==='1';
  el.dataset.on=on?'0':'1';
  el.classList.toggle('active',!on);
}

function cycleGKWall(el){
  let s=el.dataset.state||'off';
  s=s==='off'?'wall':s==='wall'?'glue':'off';
  el.dataset.state=s;
  el.classList.remove('s-wall','s-glue','active-wall');
  const st=el.querySelector('.state');
  if(s==='wall'){el.classList.add('s-wall','active-wall');st.textContent='предст.';}
  else if(s==='glue'){el.classList.add('s-glue','active-wall');st.textContent='лепене';}
  else{st.textContent='';}
  clearOvr();calcAll();
}

function resetGKWall(btn){
  const el=btn.closest('.wall-btn');
  el.dataset.state='off';
  el.classList.remove('s-wall','s-glue','active-wall');
  el.querySelector('.state').textContent='';
  clearOvr();calcAll();
}

function updateGKSchema(id){
  const root=document.getElementById(`r-${id}`);
  if(!root) return;
  const L=parseFloat(root.querySelector('.rLen').value)||0;
  const W=parseFloat(root.querySelector('.rWid').value)||0;
  const H=parseFloat(root.querySelector('.rHgt').value)||0;
  const cc=root.querySelector('.ceil-card');
  const ca=L*W;
  if(L>0&&W>0){cc.classList.remove('disabled');cc.querySelector('.area').textContent=ca.toFixed(1)+' м²';}
  else{cc.classList.add('disabled');cc.querySelector('.area').textContent='—';if(cc.dataset.on==='1'){cc.dataset.on='0';cc.classList.remove('active');}}
  const wrap=document.getElementById(`gkWrap-${id}`);
  if(!wrap) return;
  if(L<=0||W<=0||H<=0){wrap.classList.add('empty');wrap.innerHTML='<span>Въведи размери за да се появи схемата</span>';return;}
  wrap.classList.remove('empty');
  const maxPx=240,minPx=110,ratio=L/W;
  const sW=ratio>=1?maxPx:Math.max(minPx,maxPx*ratio);
  const sH=ratio>=1?Math.max(minPx,maxPx/ratio):maxPx;
  const prev={};
  wrap.querySelectorAll('.wall-btn').forEach(b=>{prev[b.dataset.wall]=b.dataset.state||'off';});
  const wt=36,aL=(L*H).toFixed(1),aS=(W*H).toFixed(1);
  wrap.innerHTML=`<div class="schema" style="width:${sW}px;height:${sH}px;">
    <div class="wall-btn" data-wall="N" data-state="off" style="top:-${wt+4}px;left:0;width:${sW}px;height:${wt}px;" onclick="cycleGKWall(this)"><span class="dim">${L}×${H}м</span><span class="m2">${aL}м²</span><span class="state"></span><button class="wall-reset" onclick="event.stopPropagation();resetGKWall(this)">✕</button></div>
    <div class="wall-btn" data-wall="S" data-state="off" style="bottom:-${wt+4}px;left:0;width:${sW}px;height:${wt}px;" onclick="cycleGKWall(this)"><span class="dim">${L}×${H}м</span><span class="m2">${aL}м²</span><span class="state"></span><button class="wall-reset" onclick="event.stopPropagation();resetGKWall(this)">✕</button></div>
    <div class="wall-btn" data-wall="W" data-state="off" style="left:-${wt+4}px;top:0;width:${wt}px;height:${sH}px;" onclick="cycleGKWall(this)"><span class="dim">${W}×${H}</span><span class="m2">${aS}м²</span><span class="state"></span><button class="wall-reset" onclick="event.stopPropagation();resetGKWall(this)">✕</button></div>
    <div class="wall-btn" data-wall="E" data-state="off" style="right:-${wt+4}px;top:0;width:${wt}px;height:${sH}px;" onclick="cycleGKWall(this)"><span class="dim">${W}×${H}</span><span class="m2">${aS}м²</span><span class="state"></span><button class="wall-reset" onclick="event.stopPropagation();resetGKWall(this)">✕</button></div>
    <div class="room-center">${L}×${W}м<div class="dims">${ca.toFixed(1)}м²</div><div style="font-size:0.6rem;color:#d9a441;margin-top:5px;line-height:1.6;">ivanov-remonti.com<br>0877 810 418</div></div>
  </div>`;
  wrap.querySelectorAll('.wall-btn').forEach(b=>{
    const s=prev[b.dataset.wall]||'off';
    if(s!=='off'){b.dataset.state=s;b.classList.add(s==='wall'?'s-wall':'s-glue','active-wall');b.querySelector('.state').textContent=s==='wall'?'предст.':'лепене';}
  });
}

function getCeilLayers(roomId){
  const result=[];
  // Main card is a div with id "pceil-{roomId}"
  const mainCard=document.getElementById(`pceil-${roomId}`);
  if(mainCard&&mainCard.dataset.pservice&&mainCard.dataset.pservice!=='off'){
    result.push(mainCard);
  }
  // Extra stack layers have class "pceil-card" but are NOT the main card
  const stack=document.getElementById(`pceilStack-${roomId}`);
  if(stack) stack.querySelectorAll(`.pceil-card:not(#pceil-${roomId})`).forEach(c=>{
    const svc=c.dataset.pservice;
    if(svc&&svc!=='off'&&svc!=='__remove__') result.push(c);
  });
  return result;
}

function renderCeilStack(roomId){
  const stack=document.getElementById(`pceilStack-${roomId}`);
  const addRow=document.getElementById(`pceilAdd-${roomId}`);
  if(!stack||!addRow) return;
  const cards=getCeilLayers(roomId);
  const mainCard=document.getElementById(`pceil-${roomId}`);
  if(!mainCard||mainCard.dataset.pservice==='off'){addRow.style.display='none';return;}
  const lastCard=cards[cards.length-1];
  const lastSvc=lastCard.dataset.pservice||'off';
  const lastIdx=PSTACK.indexOf(lastSvc);
  const canAdd=lastIdx>=0&&lastIdx<PSTACK.length-1;
  addRow.style.display='flex';
  const plus=addRow.querySelector('.pceil-plus');
  if(plus){plus.style.opacity=canAdd?'1':'0.25';plus.style.pointerEvents=canAdd?'auto':'none';}
}

function applyCeilCardStyle(el, svc){
  PCYCLE.forEach(s=>{if(s!=='off') el.classList.remove('ps-'+s);});
  if(svc==='off'){
    el.querySelector('.ptitle').textContent='ТАВАН';
    el.querySelector('.psvc').textContent='цъкни за услуга';
    el.classList.remove(...['ps-osnovna','ps-gipsova','ps-gipsova_mesh','ps-fina','ps-fugi']);
  } else {
    el.classList.add('ps-'+svc);
    el.querySelector('.ptitle').textContent='ТАВАН';
    el.querySelector('.psvc').textContent=PSVC[svc].label;
  }
}

function cyclePCeil(el, roomId){
  if(el.classList.contains('disabled')) return;
  const isMain=el.id===`pceil-${roomId}`;
  const cur=el.dataset.pservice||'off';
  // For extra ceil cards, cycle within available range
  if(!isMain){
    const stack=document.getElementById(`pceilStack-${roomId}`);
    const cards=getCeilLayers(roomId);
    const myIdx=cards.indexOf(el);
    const prevCard=cards[myIdx-1];
    const prevSvc=prevCard?prevCard.dataset.pservice:'off';
    const prevIdx=PSTACK.indexOf(prevSvc);
    const available=PSTACK.slice(prevIdx+1);
    if(!available.length) return;
    const curInAvail=available.indexOf(cur);
    const next=available[(curInAvail+1)%available.length];
    el.dataset.pservice=next;
    applyCeilCardStyle(el,next);
    // Remove extras after this
    cards.slice(myIdx+1).forEach(c=>c.remove());
    renderCeilStack(roomId);updateLayersTable(roomId);clearOvr();calcAll();
    return;
  }
  // Main card: full cycle
  const idx=PCYCLE.indexOf(cur);
  const next=PCYCLE[(idx+1)%PCYCLE.length];
  el.dataset.pservice=next;
  applyCeilCardStyle(el,next);
  if(next==='off'){
    // Remove all extra ceil cards
    getCeilLayers(roomId).slice(1).forEach(c=>c.remove());
  }
  renderCeilStack(roomId);clearOvr();updateLayersTable(roomId);calcAll();
}

function addCeilLayer(roomId){
  const stack=document.getElementById(`pceilStack-${roomId}`);
  const addRow=document.getElementById(`pceilAdd-${roomId}`);
  if(!stack||!addRow) return;
  const cards=getCeilLayers(roomId);
  const lastCard=cards[cards.length-1];
  const lastSvc=lastCard.dataset.pservice||'off';
  const lastIdx=PSTACK.indexOf(lastSvc);
  if(lastIdx<0||lastIdx>=PSTACK.length-1) return;
  const nextSvc=PSTACK[lastIdx+1];
  // Get area from main card
  const mainCard=document.getElementById(`pceil-${roomId}`);
  const areaText=mainCard?mainCard.querySelector('.parea').textContent:'—';
  const newCard=document.createElement('div');
  newCard.className='pceil-card ps-'+nextSvc;
  newCard.dataset.pservice=nextSvc;
  newCard.innerHTML=`<div class="pleft"><span class="picon">🏠</span><span class="ptitle">ТАВАН</span><span class="parea">${areaText}</span></div><span class="psvc">${PSVC[nextSvc].label}</span>`;
  newCard.onclick=()=>cyclePCeil(newCard,roomId);
  stack.insertBefore(newCard,addRow);
  renderCeilStack(roomId);clearOvr();updateLayersTable(roomId);calcAll();
}

// Stack order for putty services
const PSTACK=['osnovna','gipsova','gipsova_mesh','fugi','fina'];

function cyclePWall(el, roomId){
  const cur=el.dataset.pservice||'off';
  const idx=PCYCLE.indexOf(cur);
  const next=PCYCLE[(idx+1)%PCYCLE.length];
  el.dataset.pservice=next;
  el.dataset.layers=el.dataset.layers||'1';
  PCYCLE.forEach(s=>{if(s!=='off') el.classList.remove('ps-'+s);});
  const st=el.querySelector('.state');
  if(next==='off'){
    st.textContent='';el.classList.remove('active-wall');
    const wall=el.dataset.wall;
    const schema=el.closest('.schema');
    if(schema) schema.querySelectorAll(`.wall-extra[data-wall="${wall}"]`).forEach(x=>x.remove());
  } else {
    el.classList.add('ps-'+next,'active-wall');st.textContent=PSVC[next].label;
  }
  clearOvr();renderWallStacks(roomId);updateLayersTable(roomId);calcAll();
}

function resetPWall(btn, roomId){
  const el=btn.closest('.wall-btn');
  const wall=el.dataset.wall;
  el.dataset.pservice='off';
  PCYCLE.forEach(s=>{if(s!=='off') el.classList.remove('ps-'+s);});
  el.classList.remove('active-wall');
  el.querySelector('.state').textContent='';
  const schema=el.closest('.schema');
  if(schema) schema.querySelectorAll(`.wall-extra[data-wall="${wall}"]`).forEach(x=>x.remove());
  clearOvr();renderWallStacks(roomId);updateLayersTable(roomId);calcAll();
}

function addWallLayer(roomId, wall){
  const pWrap=document.getElementById(`pWrap-${roomId}`);
  if(!pWrap) return;
  const schema=pWrap.querySelector('.schema');
  if(!schema) return;
  const mainBtn=schema.querySelector(`.wall-btn[data-wall="${wall}"]`);
  if(!mainBtn) return;
  const mainSvc=mainBtn.dataset.pservice||'off';
  if(mainSvc==='off') return;
  // Gather existing extra layers
  const extras=Array.from(schema.querySelectorAll(`.wall-extra[data-wall="${wall}"]`));
  const lastEl=extras.length>0?extras[extras.length-1]:mainBtn;
  const lastSvc=lastEl.dataset.pservice||'off';
  const lastIdx=PSTACK.indexOf(lastSvc);
  if(lastIdx<0||lastIdx>=PSTACK.length-1) return; // already at fina/fugi or not found
  const nextSvc=PSTACK[lastIdx+1];
  // Build the extra wall element
  const isH=mainBtn.style.height===mainBtn.offsetHeight+'px'||(parseInt(mainBtn.style.height)<60);
  const extraDiv=document.createElement('div');
  extraDiv.className='wall-btn wall-extra ps-'+nextSvc;
  extraDiv.dataset.wall=wall;
  extraDiv.dataset.pservice=nextSvc;
  extraDiv.dataset.layers='1';
  // Copy geometry from main btn and offset
  extraDiv.style.cssText=mainBtn.style.cssText;
  const offset=(extras.length+1)*40;
  if(mainBtn.style.top&&parseInt(mainBtn.style.top)<0){
    extraDiv.style.top=(parseInt(mainBtn.style.top)-offset)+'px';
  } else if(mainBtn.style.bottom&&parseInt(mainBtn.style.bottom)<0){
    extraDiv.style.bottom=(parseInt(mainBtn.style.bottom)-offset)+'px';
  } else if(mainBtn.style.left&&parseInt(mainBtn.style.left)<0){
    extraDiv.style.left=(parseInt(mainBtn.style.left)-offset)+'px';
  } else if(mainBtn.style.right&&parseInt(mainBtn.style.right)<0){
    extraDiv.style.right=(parseInt(mainBtn.style.right)-offset)+'px';
  }
  const dimSpan=mainBtn.querySelector('.dim').cloneNode(true);
  const m2Span=mainBtn.querySelector('.m2').cloneNode(true);
  const stSpan=document.createElement('span');
  stSpan.className='state';
  stSpan.textContent=PSVC[nextSvc].label;
  const resetBtn=document.createElement('button');
  resetBtn.className='wall-reset';
  resetBtn.style.cssText='top:-5px;left:-5px;right:auto;display:flex;';
  resetBtn.textContent='✕';
  resetBtn.onclick=(e)=>{e.stopPropagation();e.preventDefault();removeExtraWallLayer(resetBtn,roomId);};
  extraDiv.appendChild(dimSpan);
  extraDiv.appendChild(m2Span);
  extraDiv.appendChild(stSpan);
  extraDiv.appendChild(resetBtn);
  extraDiv.onclick=()=>{cycleExtraWall(extraDiv, roomId);};
  schema.appendChild(extraDiv);
  clearOvr();renderWallStacks(roomId);updateLayersTable(roomId);calcAll();
}

function removeExtraWallLayer(btn, roomId){
  const el=btn.closest('.wall-extra');
  if(!el) return;
  const wall=el.dataset.wall;
  const schema=el.closest('.schema');
  if(!schema) return;
  const extras=Array.from(schema.querySelectorAll(`.wall-extra[data-wall="${wall}"]`));
  const myIdx=extras.indexOf(el);
  extras.slice(myIdx).forEach(x=>x.remove());
  clearOvr();renderWallStacks(roomId);updateLayersTable(roomId);calcAll();
}

function cycleExtraWall(el, roomId){
  const wall=el.dataset.wall;
  const schema=el.closest('.schema');
  const mainBtn=schema.querySelector(`.wall-btn:not(.wall-extra)[data-wall="${wall}"]`);
  const extras=Array.from(schema.querySelectorAll(`.wall-extra[data-wall="${wall}"]`));
  const myIdx=extras.indexOf(el);
  const prevEl=myIdx===0?mainBtn:extras[myIdx-1];
  const prevSvc=prevEl.dataset.pservice||'off';
  const prevIdx=PSTACK.indexOf(prevSvc);
  // Available services after prev
  const available=PSTACK.slice(prevIdx+1);
  if(!available.length) return;
  const cur=el.dataset.pservice;
  const curInAvail=available.indexOf(cur);
  const next=available[(curInAvail+1)%available.length];
  PCYCLE.forEach(s=>{if(s!=='off') el.classList.remove('ps-'+s);});
  el.classList.add('ps-'+next);
  el.dataset.pservice=next;
  el.querySelector('.state').textContent=PSVC[next].label;
  // Remove any extras after this one (stack broken)
  extras.slice(myIdx+1).forEach(x=>x.remove());
  clearOvr();renderWallStacks(roomId);updateLayersTable(roomId);calcAll();
}

    const mainBtn=schema.querySelector(`.wall-btn:not(.wall-extra)[data-wall="${wall}"]`);
    if(!mainBtn||mainBtn.dataset.pservice==='off') return;
    const extras=Array.from(schema.querySelectorAll(`.wall-extra[data-wall="${wall}"]`));
    const lastEl=extras.length>0?extras[extras.length-1]:mainBtn;
    const lastSvc=lastEl.dataset.pservice||'off';
    const lastIdx=PSTACK.indexOf(lastSvc);
    const canAdd=lastIdx>=0&&lastIdx<PSTACK.length-1;
    const plusBtn=document.createElement('div');
    plusBtn.className='wall-plus-btn';
    plusBtn.style.cssText='position:absolute;width:18px;height:18px;border-radius:50%;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center;border:none;line-height:1;z-index:10;'+(canAdd?'background:#d9a441;color:#0f172a;cursor:pointer;':'background:#334155;color:#64748b;cursor:default;opacity:0.3;');
    plusBtn.textContent='+';

    const ls=lastEl.style;
    if(ls.top&&parseInt(ls.top)<0){
      plusBtn.style.top=(parseInt(ls.top)-4)+'px';
      plusBtn.style.left=(parseInt(ls.left||'0')+parseInt(ls.width||'0')-8)+'px';
    } else if(ls.bottom&&parseInt(ls.bottom)<0){
      plusBtn.style.bottom=(parseInt(ls.bottom)-4)+'px';
      plusBtn.style.left=(parseInt(ls.left||'0')+parseInt(ls.width||'0')-8)+'px';
    } else if(ls.left&&parseInt(ls.left)<0){
      plusBtn.style.left=(parseInt(ls.left)-4)+'px';
      plusBtn.style.top=(parseInt(ls.top||'0')+parseInt(ls.height||'0')-8)+'px';
    } else if(ls.right&&parseInt(ls.right)<0){
      plusBtn.style.right=(parseInt(ls.right)-4)+'px';
      plusBtn.style.top=(parseInt(ls.top||'0')+parseInt(ls.height||'0')-8)+'px';
    }
    if(canAdd) plusBtn.onclick=(e)=>{e.stopPropagation();addWallLayer(roomId,wall);};
    schema.appendChild(plusBtn);
  });
}

function updatePuttySchema(id){
  const root=document.getElementById(`p-${id}`);
  if(!root) return;
  const L=parseFloat(root.querySelector('.pL').value)||0;
  const W=parseFloat(root.querySelector('.pW').value)||0;
  const H=parseFloat(root.querySelector('.pH').value)||0;
  const cc=document.getElementById(`pceil-${id}`);
  const ca=L*W;
  if(L>0&&W>0){
    cc.classList.remove('disabled');
    cc.querySelector('.parea').textContent=ca.toFixed(1)+' м²';
    // Update area on extra ceil cards too
    getCeilLayers(id).slice(1).forEach(c=>{if(c.querySelector('.parea')) c.querySelector('.parea').textContent=ca.toFixed(1)+' м²';});
  } else {
    cc.classList.add('disabled');
    cc.querySelector('.parea').textContent='—';
    if(cc.dataset.pservice!=='off'){
      cc.dataset.pservice='off';
      PCYCLE.forEach(s=>{if(s!=='off') cc.classList.remove('ps-'+s);});
      cc.querySelector('.ptitle').textContent='ТАВАН';
      cc.querySelector('.psvc').textContent='цъкни за услуга';
      getCeilLayers(id).slice(1).forEach(c=>c.remove());
    }
  }
  const wrap=document.getElementById(`pWrap-${id}`);
  if(!wrap) return;
  if(L<=0||W<=0||H<=0){wrap.classList.add('empty');wrap.innerHTML='<span>Въведи размери за да се появи схемата</span>';const info=document.getElementById(`pInfo-${id}`);if(info)info.style.display='none';return;}
  wrap.classList.remove('empty');
  const pInfoEl=document.getElementById(`pInfo-${id}`);
  if(pInfoEl){
    pInfoEl.style.display='flex';
    document.getElementById(`pInfoCeil-${id}`).textContent=(L*W).toFixed(1);
    document.getElementById(`pInfoWall-${id}`).textContent=(2*(L+W)*H).toFixed(1);
    document.getElementById(`pInfoTotal-${id}`).textContent=(L*W+2*(L+W)*H).toFixed(1);
  }
  const maxPx=240,minPx=110,ratio=L/W;
  const sW=ratio>=1?maxPx:Math.max(minPx,maxPx*ratio);
  const sH=ratio>=1?Math.max(minPx,maxPx/ratio):maxPx;
  const prev={};
  const prevExtras={};
  wrap.querySelectorAll('.wall-btn').forEach(b=>{prev[b.dataset.wall]={svc:b.dataset.pservice||'off',layers:b.dataset.layers||'1'};});
  wrap.querySelectorAll('.wall-extra').forEach(b=>{
    const w=b.dataset.wall;
    if(!prevExtras[w]) prevExtras[w]=[];
    prevExtras[w].push(b.dataset.pservice||'off');
  });
  const wt=36,aL=(L*H).toFixed(1),aS=(W*H).toFixed(1);
  wrap.innerHTML=`<div class="schema" style="width:${sW}px;height:${sH}px;">
    <div class="wall-btn" data-wall="N" data-pservice="off" data-layers="1" style="top:-${wt+4}px;left:0;width:${sW}px;height:${wt}px;" onclick="cyclePWall(this,'${id}')"><span class="dim">${L}×${H}м</span><span class="m2">${aL}м²</span><span class="state"></span><button class="wall-reset" onclick="event.stopPropagation();event.preventDefault();resetPWall(this,'${id}')">✕</button></div>
    <div class="wall-btn" data-wall="S" data-pservice="off" data-layers="1" style="bottom:-${wt+4}px;left:0;width:${sW}px;height:${wt}px;" onclick="cyclePWall(this,'${id}')"><span class="dim">${L}×${H}м</span><span class="m2">${aL}м²</span><span class="state"></span><button class="wall-reset" onclick="event.stopPropagation();event.preventDefault();resetPWall(this,'${id}')">✕</button></div>
    <div class="wall-btn" data-wall="W" data-pservice="off" data-layers="1" style="left:-${wt+4}px;top:0;width:${wt}px;height:${sH}px;" onclick="cyclePWall(this,'${id}')"><span class="dim">${W}×${H}</span><span class="m2">${aS}м²</span><span class="state"></span><button class="wall-reset" onclick="event.stopPropagation();event.preventDefault();resetPWall(this,'${id}')">✕</button></div>
    <div class="wall-btn" data-wall="E" data-pservice="off" data-layers="1" style="right:-${wt+4}px;top:0;width:${wt}px;height:${sH}px;" onclick="cyclePWall(this,'${id}')"><span class="dim">${W}×${H}</span><span class="m2">${aS}м²</span><span class="state"></span><button class="wall-reset" onclick="event.stopPropagation();event.preventDefault();resetPWall(this,'${id}')">✕</button></div>
    <div class="room-center">${L}×${W}м<div class="dims">${ca.toFixed(1)}м²</div><div style="font-size:0.6rem;color:#d9a441;margin-top:5px;line-height:1.6;">ivanov-remonti.com<br>0877 810 418</div></div>
  </div>`;
  wrap.querySelectorAll('.wall-btn').forEach(b=>{
    const p=prev[b.dataset.wall];
    if(p&&p.svc!=='off'){
      b.dataset.pservice=p.svc;b.dataset.layers=p.layers;
      b.classList.add('ps-'+p.svc,'active-wall');
      b.querySelector('.state').textContent=PSVC[p.svc].label;
    }
  });
  // Restore extra stack layers
  if(prevExtras){
    Object.entries(prevExtras).forEach(([wall,layers])=>{
      layers.forEach(svc=>{
        const mainBtn=wrap.querySelector(`.wall-btn[data-wall="${wall}"]`);
        if(!mainBtn||mainBtn.dataset.pservice==='off') return;
        addWallLayer(id,wall);
        // Set the correct svc on the just-added extra
        const schema=wrap.querySelector('.schema');
        const extras=Array.from(schema.querySelectorAll(`.wall-extra[data-wall="${wall}"]`));
        if(extras.length>0){
          const last=extras[extras.length-1];
          PCYCLE.forEach(s=>{if(s!=='off') last.classList.remove('ps-'+s);});
          last.classList.add('ps-'+svc);
          last.dataset.pservice=svc;
          last.querySelector('.state').textContent=PSVC[svc].label;
        }
      });
    });
  }
  renderWallStacks(id);
  renderCeilStack(id);
  updateLayersTable(id);
}

function updateLayersTable(id){
  const root=document.getElementById(`p-${id}`);
  const wrap=document.getElementById(`lt-${id}`);
  const body=document.getElementById(`ltBody-${id}`);
  if(!root||!wrap||!body) return;
  const L=parseFloat(root.querySelector('.pL').value)||0;
  const W=parseFloat(root.querySelector('.pW').value)||0;
  const H=parseFloat(root.querySelector('.pH').value)||0;
  const rows=[];
  // Ceiling (all stack layers)
  const cc=document.getElementById(`pceil-${id}`);
  if(cc&&cc.dataset.pservice!=='off'&&L>0&&W>0){
    const area=(L*W).toFixed(1);
    getCeilLayers(id).forEach((card,ci)=>{
      const svc_key=card.dataset.pservice||'off';
      if(svc_key==='off') return;
      const svc=PSVC[svc_key];
      const key=ci===0?'c':'c_extra'+ci;
      rows.push({key,label:`🏠 Таван (${svc.label})`,area,layers:1,el:card});
    });
  }
  // Walls
  const walls=['N','S','W','E'];
  const wallLabels={N:`${L}×${H}м`,S:`${L}×${H}м`,W:`${W}×${H}м`,E:`${W}×${H}м`};
  const wallAreas={N:(L*H).toFixed(1),S:(L*H).toFixed(1),W:(W*H).toFixed(1),E:(W*H).toFixed(1)};
  const wrapEl=document.getElementById(`pWrap-${id}`);
  if(wrapEl){
    const wallNames={N:'С',S:'Ю',W:'З',E:'И'};
    ['N','S','W','E'].forEach(wall=>{
      const mainBtn=wrapEl.querySelector(`.wall-btn:not(.wall-extra)[data-wall="${wall}"]`);
      if(!mainBtn) return;
      const svc_key=mainBtn.dataset.pservice||'off';
      if(svc_key==='off') return;
      const svc=PSVC[svc_key];
      rows.push({key:wall,label:`🧱 Стена ${wallNames[wall]} ${wallLabels[wall]} (${svc.label})`,area:wallAreas[wall],layers:parseInt(mainBtn.dataset.layers||'1')});
      // Extra stack layers for this wall
      wrapEl.querySelectorAll(`.wall-extra[data-wall="${wall}"]`).forEach((ex,i)=>{
        const exSvc_key=ex.dataset.pservice||'off';
        if(exSvc_key==='off') return;
        const exSvc=PSVC[exSvc_key];
        rows.push({key:wall+'_extra'+i,label:`   ↳ Стена ${wallNames[wall]} (${exSvc.label})`,area:wallAreas[wall],layers:parseInt(ex.dataset.layers||'1'),isExtra:true,extraEl:ex});
      });
    });
  }
  if(rows.length===0){wrap.classList.add('empty');return;}
  wrap.classList.remove('empty');
  body.innerHTML=rows.map(r=>{
    const isCeil=r.key==='c'||r.key.startsWith('c_extra');
    const layerBtns=isCeil?'':`<div class="layers-btns">
        <button class="lbtn${r.layers===1?' active':''}" onclick="setPLayers(this,'${id}','${r.key}',1)">1</button>
        <button class="lbtn${r.layers===2?' active':''}" onclick="setPLayers(this,'${id}','${r.key}',2)">2</button>
        <button class="lbtn${r.layers===3?' active':''}" onclick="setPLayers(this,'${id}','${r.key}',3)">3</button>
      </div>`;
    return `<div class="layers-row">
      <span class="layers-name">${r.label}</span>
      <span class="layers-area">${r.area} м²</span>
      ${layerBtns}
    </div>`;
  }).join('');
}

function setPLayers(btn, roomId, key, layers){
  // Update dataset on the source element
  if(key==='c'){
    const cc=document.getElementById(`pceil-${roomId}`);
    if(cc) cc.dataset.layers=layers;
  } else {
    const wrap=document.getElementById(`pWrap-${roomId}`);
    if(wrap){
      const wb=wrap.querySelector(`.wall-btn[data-wall="${key}"]`);
      if(wb) wb.dataset.layers=layers;
    }
  }
  // Update button highlight in layers table
  const row=btn.closest('.layers-row');
  row.querySelectorAll('.lbtn').forEach((b,i)=>b.classList.toggle('active',i+1===layers));
  clearOvr();calcAll();
}

// ═══ GK CALCULATION ═══
function calcGK(){
  let tArea=0,boardArea=0,ud=0,cd=0,hangers=0,screws=0,dowel=0,glue=0,ins=0,foam=0;
  const pLen=parseFloat(document.getElementById('pLen').value);
  const positions=[];
  document.querySelectorAll('#roomsContainer .room').forEach(r=>{
    const kind=r.dataset.kind;
    const name=r.querySelector('.title-input').value||(kind==='room'?'Помещение':'Преградна');
    if(kind==='room'){
      const L=parseFloat(r.querySelector('.rLen').value)||0;
      const W=parseFloat(r.querySelector('.rWid').value)||0;
      const H=parseFloat(r.querySelector('.rHgt').value)||0;
      if(L<=0||W<=0||H<=0) return;
      if(r.querySelector('.ceil-card').dataset.on==='1'){
        const a=L*W,p=2*(L+W);
        // UD: периметър с 10% фира
        const udCeil=Math.ceil((p/pLen)*1.1);
        // CD: по по-краткия размер на 0.6м, дължина = по-дългия
        const shortC=Math.min(L,W), longC=Math.max(L,W);
        const regC=Math.floor(shortC/0.6)-1;
        const remC=shortC-regC*0.6;
        const colsC=remC>=0.7?regC+1:regC;
        const cdCeil=Math.ceil((colsC*longC/pLen)*1.1);
        boardArea+=a;ud+=udCeil;cd+=cdCeil;
        hangers+=a*2.8;screws+=a*15;dowel+=p/0.7;dowel+=(a*2.8)*2;
        ins+=a;tArea+=a;positions.push({name:name+' – Таван',area:a.toFixed(1)});
      }
      r.querySelectorAll('#gkWrap-'+r.id.replace('r-','')+' .wall-btn').forEach(wb=>{
        const s=wb.dataset.state||'off';if(s==='off') return;
        const wl=(wb.dataset.wall==='N'||wb.dataset.wall==='S')?L:W;
        const a=wl*H;
        if(s==='wall'){
          // UD: всички 4 страни с 10% фира
          const udWall=Math.ceil(((2*wl+2*H)/pLen)*1.1);
          // CD: колони по ширината на 0.6м, дължина = H
          const regW=Math.floor(wl/0.6)-1;
          const remW=wl-regW*0.6;
          const colsW=remW>=0.7?regW+1:regW;
          const cdWall=Math.ceil((colsW*H/pLen)*1.1);
          boardArea+=a;ud+=udWall;cd+=cdWall;hangers+=a*1.5;screws+=a*15;dowel+=Math.ceil(((2*wl+2*H)/0.7)*1.1);ins+=a;tArea+=a;
          positions.push({name:name+` – Предстена (${wl}×${H}м)`,area:a.toFixed(1)});
        }
        else{boardArea+=a;glue+=a*4;foam+=a/10;tArea+=a;positions.push({name:name+` – Лепене (${wl}×${H}м)`,area:a.toFixed(1)});}
      });
    } else if(kind==='part'){
      const L=parseFloat(r.querySelector('.pLen2').value)||0;
      const H=parseFloat(r.querySelector('.pHgt').value)||0;
      if(L<=0||H<=0) return;
      const a=L*H;
      // UD: само горе + долу с 10% фира
      const udPart=Math.ceil(((2*L)/pLen)*1.1);
      // CD: колони по дължината на 0.6м, дължина = H
      const regP=Math.floor(L/0.6)-1;
      const remP=L-regP*0.6;
      const colsP=remP>=0.7?regP+1:regP;
      const cdPart=Math.ceil((colsP*H/pLen)*1.1);
      boardArea+=a*2;ud+=udPart;cd+=cdPart;screws+=(a*2)*15;dowel+=Math.ceil((2*L/0.7)*1.1);ins+=a;tArea+=a;
      positions.push({name:r.querySelector('.title-input').value||'Преградна'+` (${L}×${H}м)`,area:(a*2).toFixed(1)});
    }
  });
  const buttons=hangers*2;
  const joint=boardArea*0.4,finish=boardArea*1.2,tape=boardArea*1.5,primer=boardArea*0.2;
  const bSizeVal=parseFloat(document.getElementById('bSize').value);
  const totalBoards=boardArea>0?Math.ceil((boardArea*1.1)/bSizeVal):0;
  const hasGreen=document.getElementById('hasGreen').checked;
  const green=hasGreen?(parseInt(document.getElementById('greenManual').value)||0):0;
  const bSizeEl=document.getElementById('bSize');
  GKD={tArea,boardArea,totalBoards,board_std:Math.max(0,totalBoards-green),board_grn:green,
    prof_ud:Math.ceil(ud),prof_cd:Math.ceil(cd),hangers:Math.ceil(hangers),buttons:Math.ceil(buttons),
    screws:Math.ceil(screws),dowels:Math.ceil(dowel),joint:Math.ceil(joint),finish:Math.ceil(finish),
    tape:Math.ceil(tape),primer:Math.ceil(primer),ins:Math.ceil(ins),glue:Math.ceil(glue),
    foam:Math.ceil(foam),foam_r:foam,
    joint_r:joint,finish_r:finish,tape_r:tape,primer_r:primer,glue_r:glue,
    positions,pLen:parseFloat(document.getElementById('pLen').value),
    bSizeTxt:bSizeEl.options[bSizeEl.selectedIndex].text,bThick:document.getElementById('bThick').value,hasGreen,
  };
}

// ═══ PUTTY CALCULATION ═══
function calcPutty(){
  let osnovna=0,gipsova=0,gipsova_mesh=0,fina=0,fugi=0;
  const puttyPositions=[];
  const puttyRooms=[];   // per-room breakdown
  const usedSvcs=new Set(); // all services used across all rooms

  document.querySelectorAll('#puttyContainer .room').forEach(r=>{
    const rid=r.id.replace('p-','');
    const L=parseFloat(r.querySelector('.pL').value)||0;
    const W=parseFloat(r.querySelector('.pW').value)||0;
    const H=parseFloat(r.querySelector('.pH').value)||0;
    if(L<=0||W<=0||H<=0) return;
    const name=r.querySelector('.title-input').value||'Помещение';

    let roomCeil=0, roomWall=0;
    const roomPositions=[];

    // Ceiling (all stack layers) — reads from select + extra cards
    const ceilLayers=getCeilLayers(rid);
    if(ceilLayers.length>0){
      const a=L*W;
      roomCeil=a;
      const ceilSvcs=[];
      ceilLayers.forEach(card=>{
        const svc_key=card.dataset.pservice||'off';
        if(svc_key==='off'||svc_key==='__remove__') return;
        const svc=PSVC[svc_key];
        if(!svc) return;
        accumPutty(svc_key,a,1,svc.mesh);
        usedSvcs.add(svc_key);
        ceilSvcs.push(svc.label);
        puttyPositions.push({name:name+' – Таван',area:a.toFixed(1),svc:svc.label,layers:1});
      });
      if(ceilSvcs.length) roomPositions.push({label:'Таван',area:a,svcs:ceilSvcs});
    }

    // Walls (main + extra stack layers)
    const wrap=document.getElementById(`pWrap-${rid}`);
    const wallDirNames={N:'С',S:'Ю',W:'З',E:'И'};
    const wallSeenArea={};
    if(wrap){
      wrap.querySelectorAll('.wall-btn:not(.wall-extra)').forEach(wb=>{
        const svc_key=wb.dataset.pservice||'off';
        if(svc_key==='off') return;
        const svc=PSVC[svc_key];
        const layers=parseInt(wb.dataset.layers||'1');
        const wall=wb.dataset.wall;
        const wallLen=(wall==='N'||wall==='S')?L:W;
        const a=wallLen*H;
        const wallName=`Стена ${wallDirNames[wall]}`;
        if(!wallSeenArea[wall]){wallSeenArea[wall]=a;roomWall+=a;}
        accumPutty(svc_key,a,layers,svc.mesh);
        usedSvcs.add(svc_key);
        const wallSvcs=[svc.label];
        puttyPositions.push({name:name+' – '+wallName+` (${wallLen}×${H}м)`,area:a.toFixed(1),svc:svc.label,layers,isWall:true});
        // Extra stack layers
        wrap.querySelectorAll(`.wall-extra[data-wall="${wall}"]`).forEach(ex=>{
          const exSvc_key=ex.dataset.pservice||'off';
          if(exSvc_key==='off') return;
          const exSvc=PSVC[exSvc_key];
          const exLayers=parseInt(ex.dataset.layers||'1');
          accumPutty(exSvc_key,a,exLayers,exSvc.mesh);
          usedSvcs.add(exSvc_key);
          wallSvcs.push(exSvc.label);
          puttyPositions.push({name:name+' – '+wallName+` (${wallLen}×${H}м)`,area:a.toFixed(1),svc:exSvc.label,layers:exLayers,isWall:true,extra:true});
        });
        roomPositions.push({label:wallName+` (${wallLen}×${H}м)`,area:a,svcs:wallSvcs});
      });
    }

    if(roomPositions.length>0){
      puttyRooms.push({name,ceilM2:roomCeil,wallM2:roomWall,positions:roomPositions});
    }

    function accumPutty(key,a,layers,mesh){
      const svc=PSVC[key];
      const norm=svc.norm;
      if(key==='osnovna') osnovna+=a*norm*layers;
      else if(key==='gipsova') gipsova+=a*norm*layers;
      else if(key==='gipsova_mesh'){gipsova+=a*norm*layers;gipsova_mesh+=a;}
      else if(key==='fina') fina+=a*norm*layers;
      else if(key==='fugi') fugi+=a*norm*layers;
    }
  });

  PD={
    osnovna:Math.ceil(osnovna),gipsova:Math.ceil(gipsova),
    gipsova_mesh:Math.ceil(gipsova_mesh),fina:Math.ceil(fina),fugi:Math.ceil(fugi),
    osnovna_r:osnovna,gipsova_r:gipsova,fina_r:fina,fugi_r:fugi,
    hasAny:osnovna>0||gipsova>0||fina>0||fugi>0,
    puttyPositions, puttyRooms, usedSvcs,
  };
}

// ═══ RENDER ROW ═══
function mkR(id,lbl,rawQty,rawUnit,rawCalc){
  if(rawQty<=0&&!ovr[id]) return '';
  const cfg=PKG[id];
  const qty=ovr[id]!==undefined?ovr[id]:rawQty;
  const isOvr=ovr[id]!==undefined;
  let pkgCount=0, pkgHtml;
  if(cfg.ps>0&&qty>0){
    pkgCount=Math.ceil(qty/cfg.ps);
    pkgHtml=`<span class="n">${pkgCount}</span><span class="u"> ${pkgCount===1?cfg.pu:cfg.pp} ${cfg.sz}</span>`;
  } else {
    pkgCount=qty;
    pkgHtml=`<span class="n">${qty}</span><span class="u"> ${cfg.pu}</span>`;
  }
  const rightVal=cfg.ps>0&&rawCalc!==undefined?(isOvr?`${qty} ${rawUnit}`:`${Math.round(rawCalc)} ${rawUnit}`):'';
  let priceHtml='';
  if(cfg.price>0&&pkgCount>0){
    const totalEur=(cfg.price*pkgCount*MARKUP).toFixed(2);
    const totalLv=(cfg.price*pkgCount*MARKUP*EUR2LV).toFixed(2);
    const unitEur=(cfg.price*MARKUP).toFixed(2);
    priceHtml=`<div style="text-align:right;line-height:1.3;"><span style="color:#d9a441;font-weight:700;font-size:0.88rem;">${totalEur}€</span><span style="color:#64748b;font-size:0.72rem;"> / ${totalLv}лв</span><br><span style="font-size:0.65rem;color:#475569;">${unitEur}€/оп.</span></div>`;
  }
  return `<tr class="${isOvr?'overridden':''}">
    <td class="col-name">${lbl}</td>
    <td class="col-pkg" id="qc-${id}">${pkgHtml}</td>
    <td class="col-raw">${rightVal}</td>
    <td style="vertical-align:middle;padding:4px 6px;white-space:nowrap;">${priceHtml}</td>
    <td class="col-edit"><button class="edit-btn" onclick="startEdit('${id}',${pkgCount},'${cfg.ps>0?(pkgCount===1?cfg.pu:cfg.pp):rawUnit}')">✏️</button></td>
  </tr>`;
}

function calcTotalCost(pairs){
  let total=0;
  (pairs||[]).forEach(p=>{
    if(!p||!p[0]) return;
    const cfg=PKG[p[0]];
    if(!cfg||!cfg.price) return;
    const qty=ovr[p[0]]!==undefined?ovr[p[0]]:p[1];
    if(!(qty>0)) return;
    const pkgCount=cfg.ps>0?Math.ceil(qty/cfg.ps):qty;
    total+=cfg.price*pkgCount*MARKUP;
  });
  return total;
}

// ═══ INLINE EDIT ═══
function startEdit(id,qty,unit){
  const cell=document.getElementById(`qc-${id}`);
  if(!cell) return;
  cell.innerHTML=`<input class="qty-edit" id="ei-${id}" type="number" value="${qty}" min="0" step="1" onblur="commitEdit('${id}','${unit}')" onkeydown="if(event.key==='Enter')this.blur();if(event.key==='Escape'){this.dataset.esc=1;this.blur();}">`;
  const inp=document.getElementById(`ei-${id}`);
  inp.focus();inp.select();
}
function commitEdit(id,unit){
  const inp=document.getElementById(`ei-${id}`);
  if(!inp) return;
  if(inp.dataset.esc){renderResults();return;}
  const v=parseFloat(inp.value);
  if(!isNaN(v)&&v>=0){
    const cfg=PKG[id];
    // Записваме в единици за да е съвместимо с изчисленията
    ovr[id]=cfg&&cfg.ps>0?Math.ceil(v)*cfg.ps:Math.ceil(v);
  }
  renderResults();
}

    if(show.joint||show.finish||show.tape||show.primer) addSec('ФИНИШ',[...(show.joint?[['Фугираща смес','joint',getQ('joint',d.joint),'кг',d.joint_r]]:[] ),...(show.finish?[['Шпакловка (фина)','finish',getQ('finish',d.finish),'кг',d.finish_r]]:[] ),...(show.tape?[['Лента','tape',getQ('tape',d.tape),'м',d.tape_r]]:[] ),...(show.primer?[['Грунд','primer',getQ('primer',d.primer),'л',d.primer_r]]:[] )]);
    if(show.ins||show.glue||show.foam) addSec('ДОПЪЛНИТЕЛНИ',[...(show.ins&&d.ins>0?[['Изолация','ins',getQ('ins',d.ins),'м²']]:[] ),...(show.glue&&d.glue>0?[['Лепило','glue',getQ('glue',d.glue),'кг',d.glue_r]]:[] ),...(show.foam&&d.foam>0?[['Монтажна пяна (750мл)','foam',getQ('foam',d.foam),'бр',d.foam_r]]:[] )]);
    y=makePDFTable('ГИПСОКАРТОН',d.positions,rows,y);
  }
  // Putty
  if(PD.hasAny){
    const pRows=[];
    const addPS=(label,items)=>{const f=items.filter(i=>i&&i[2]>0);if(!f.length) return;pRows.push([{content:label,colSpan:5,styles:{fillColor:[30,41,59],textColor:[217,164,65],fontStyle:'bold'}}]);f.forEach(([nm,id,qty,unit,rawCalc])=>{const cfg=PKG[id];const pkg=getPkg(id,qty);let pkgCount=cfg&&cfg.ps>0?Math.ceil(qty/cfg.ps):qty;const unitPrice=cfg&&cfg.price>0?(cfg.price*MARKUP).toFixed(2)+'€':'—';const totalPrice=cfg&&cfg.price>0&&pkgCount>0?(cfg.price*pkgCount*MARKUP).toFixed(2)+'€':'—';pRows.push([nm,pkg||`${qty} ${unit}`,rawCalc!==undefined?getRaw(id,rawCalc,unit):'',unitPrice,totalPrice]);});};
    if(PD.osnovna>0) addPS('ОСНОВНА МАЗИЛКА',[['Основна мазилка','p_osnovna',getQ('p_osnovna',PD.osnovna),'кг',PD.osnovna_r]]);
    if(PD.gipsova>0) addPS('ГИПСОВА ШПАКЛОВКА',[['Гипсова шпакловка','p_gipsova',getQ('p_gipsova',PD.gipsova),'кг',PD.gipsova_r],...(PD.gipsova_mesh>0?[['Армираща мрежа','p_mreja',getQ('p_mreja',PD.gipsova_mesh),'м²']]:[] )]);
    if(PD.fina>0) addPS('ФИНА ШПАКЛОВКА',[['Фина шпакловка','p_fina',getQ('p_fina',PD.fina),'кг',PD.fina_r]]);
    if(PD.fugi>0) addPS('ФУГИ',[['Фуги','p_fugi',getQ('p_fugi',PD.fugi),'кг',PD.fugi_r]]);
    // Build positions table for PDF — per room, each wall separate
    const posBody=[];
    let pdfTotalCeil=0,pdfTotalWall=0;
    if((PD.puttyRooms||[]).length>0){
      PD.puttyRooms.forEach(rm=>{
        if(PD.puttyRooms.length>1) posBody.push([{content:rm.name,colSpan:3,styles:{fillColor:[30,41,59],textColor:[217,164,65],fontStyle:'bold'}}]);
        rm.positions.forEach(p=>{posBody.push([p.label, p.area.toFixed(1)+' м²', p.svcs.join(' + ')]);});
        pdfTotalCeil+=rm.ceilM2;pdfTotalWall+=rm.wallM2;
      });
      // Always show totals
      posBody.push([{content:'Тавани общо',styles:{fontStyle:'bold'}},{content:pdfTotalCeil.toFixed(1)+' м²',styles:{halign:'right',fontStyle:'bold'}},{content:''}]);
      posBody.push([{content:'Стени общо',styles:{fontStyle:'bold'}},{content:pdfTotalWall.toFixed(1)+' м²',styles:{halign:'right',fontStyle:'bold'}},{content:''}]);
      posBody.push([{content:'ОБЩО',styles:{fontStyle:'bold',fillColor:[217,164,65],textColor:[15,23,42]}},{content:(pdfTotalCeil+pdfTotalWall).toFixed(1)+' м²',styles:{halign:'right',fontStyle:'bold',fillColor:[217,164,65],textColor:[15,23,42]}},{content:'',styles:{fillColor:[217,164,65]}}]);
    }
    let ly=y;
    if(posBody.length>0){
      doc.setFontSize(11);doc.setTextColor(217,164,65);doc.text('ШПАКЛОВКА – Позиции',14,ly);ly+=5;
      doc.autoTable({startY:ly,head:[['Позиция','м²','Услуги']],body:posBody,styles:{font:'Roboto',fontSize:9,cellPadding:2},headStyles:{fillColor:[30,41,59],textColor:[217,164,65],fontStyle:'bold'},alternateRowStyles:{fillColor:[248,250,252]},columnStyles:{1:{halign:'right',cellWidth:24},2:{cellWidth:70}}});
      ly=doc.lastAutoTable.finalY+6;
    }
    if(pRows.length>0){
      doc.setFontSize(11);doc.setTextColor(217,164,65);doc.text('ШПАКЛОВКА – Материали',14,ly);ly+=5;
      doc.autoTable({startY:ly,head:[['Материал','Опаковки','Количество','Цена/оп.','Общо (€)']],body:pRows,styles:{font:'Roboto',fontSize:9,cellPadding:3},headStyles:{fillColor:[217,164,65],textColor:[15,23,42],fontStyle:'bold'},alternateRowStyles:{fillColor:[248,250,252]},columnStyles:{1:{halign:'right',fontStyle:'bold'},2:{halign:'right',textColor:[130,130,130],cellWidth:28},3:{halign:'right',cellWidth:26},4:{halign:'right',fontStyle:'bold',cellWidth:26}}});
      ly=doc.lastAutoTable.finalY+8;
    }
    y=ly;
  }
  // Custom materials in PDF
  {
    const cmValid=customMats.filter(m=>m.name&&m.qty>0&&m.unitPrice>0);
    if(cmValid.length>0){
      const cmPdfRows=cmValid.map(m=>{
        const pkgCount=m.qty;
        const unitP=(m.unitPrice*MARKUP).toFixed(2)+'€';
        const totP=(m.unitPrice*m.qty*MARKUP).toFixed(2)+'€';
        return [m.name,`${m.qty} бр.`,'',unitP,totP];
      });
      doc.setFontSize(11);doc.setTextColor(217,164,65);doc.text('ДРУГИ – Материали',14,y);y+=5;
      doc.autoTable({startY:y,head:[['Материал','Количество','','Цена/бр.','Общо (€)']],body:cmPdfRows,styles:{font:'Roboto',fontSize:9,cellPadding:3},headStyles:{fillColor:[217,164,65],textColor:[15,23,42],fontStyle:'bold'},alternateRowStyles:{fillColor:[248,250,252]},columnStyles:{1:{halign:'right',fontStyle:'bold'},2:{cellWidth:10},3:{halign:'right',cellWidth:26},4:{halign:'right',fontStyle:'bold',cellWidth:26}}});
      y=doc.lastAutoTable.finalY+8;
    }
  }
  {
    const allPairs=[
      d.boardArea>0&&document.getElementById('mBoard').checked?['board_std',getQ('board_std',d.board_std)]:null,
      d.boardArea>0&&document.getElementById('mBoard').checked&&d.hasGreen?['board_grn',getQ('board_grn',d.board_grn)]:null,
      d.boardArea>0&&document.getElementById('mProfile').checked?['prof_ud',getQ('prof_ud',d.prof_ud)]:null,
      d.boardArea>0&&document.getElementById('mProfile').checked?['prof_cd',getQ('prof_cd',d.prof_cd)]:null,
      d.boardArea>0&&document.getElementById('mHanger').checked?['hangers',getQ('hangers',d.hangers)]:null,
      d.boardArea>0&&document.getElementById('mButton').checked?['buttons',getQ('buttons',d.buttons)]:null,
      d.boardArea>0&&document.getElementById('mScrews').checked?['screws',getQ('screws',d.screws)]:null,
      d.boardArea>0&&document.getElementById('mDowel').checked?['dowels',getQ('dowels',d.dowels)]:null,
      d.boardArea>0&&document.getElementById('mJoint').checked?['joint',getQ('joint',d.joint)]:null,
      d.boardArea>0&&document.getElementById('mFinish').checked?['finish',getQ('finish',d.finish)]:null,
      d.boardArea>0&&document.getElementById('mTape').checked?['tape',getQ('tape',d.tape)]:null,
      d.boardArea>0&&document.getElementById('mPrimer').checked?['primer',getQ('primer',d.primer)]:null,
      d.boardArea>0&&document.getElementById('mGlue').checked&&d.glue>0?['glue',getQ('glue',d.glue)]:null,
      d.boardArea>0&&document.getElementById('mFoam').checked&&d.foam>0?['foam',getQ('foam',d.foam)]:null,
      PD.hasAny&&PD.osnovna>0?['p_osnovna',getQ('p_osnovna',PD.osnovna)]:null,
      PD.hasAny&&PD.gipsova>0?['p_gipsova',getQ('p_gipsova',PD.gipsova)]:null,
      PD.hasAny&&PD.gipsova_mesh>0?['p_mreja',getQ('p_mreja',PD.gipsova_mesh)]:null,
      PD.hasAny&&PD.fina>0?['p_fina',getQ('p_fina',PD.fina)]:null,
      PD.hasAny&&PD.fugi>0?['p_fugi',getQ('p_fugi',PD.fugi)]:null,
    ].filter(Boolean);
    let grandEur=0;
    allPairs.forEach(([id,qty])=>{const cfg=PKG[id];if(!cfg||!cfg.price||!(qty>0)) return;const pkgCount=cfg.ps>0?Math.ceil(qty/cfg.ps):qty;grandEur+=cfg.price*pkgCount*MARKUP;});
    // add custom mats
    customMats.forEach(m=>{if(m.name&&m.qty>0&&m.unitPrice>0) grandEur+=m.unitPrice*m.qty*MARKUP;});
    if(grandEur>0){
      const grandLv=(grandEur*EUR2LV).toFixed(2);
      doc.autoTable({startY:y,head:[],body:[[{content:'ОБЩО МАТЕРИАЛИ (без труд)',styles:{fontStyle:'bold',fillColor:[217,164,65],textColor:[15,23,42],halign:'left'}},{content:grandEur.toFixed(2)+' €',styles:{fontStyle:'bold',fillColor:[217,164,65],textColor:[15,23,42],halign:'right'}},{content:grandLv+' лв',styles:{fillColor:[217,164,65],textColor:[15,23,42],halign:'right'}},{content:'',styles:{fillColor:[217,164,65]}},{content:'',styles:{fillColor:[217,164,65]}}]],styles:{font:'Roboto',fontSize:10,cellPadding:4},columnStyles:{1:{cellWidth:30},2:{cellWidth:28},3:{cellWidth:26},4:{cellWidth:26}}});
      y=doc.lastAutoTable.finalY+4;
    }
  }
  doc.setFontSize(8);doc.setTextColor(150,150,150);doc.text('* заложен отпадък на плоскости: 10%',14,y);
  const pageCount=doc.getNumberOfPages();
  for(let pi=1;pi<=pageCount;pi++){
    doc.setPage(pi);
    const ph=doc.internal.pageSize.getHeight();
    doc.setFillColor(30,41,59);doc.rect(0,ph-10,210,10,'F');
    doc.setFontSize(7);doc.setTextColor(148,163,184);
    doc.text('ivanov-remonti.com',14,ph-3.5);
    doc.text('0877 810 418',210-14,ph-3.5,{align:'right'});
    doc.text('str. '+pi+' / '+pageCount,105,ph-3.5,{align:'center'});
  }
  doc.save(pFileName+'.pdf');
}

function sendToOffer(){
  const data={
    project: document.getElementById('pName').value||'',
    date:    document.getElementById('pDate').value||'',
    gk_ceil_m2:0, gk_wall_m2:0, gk_part_m2:0,
    putty_osnovna_m2:0, putty_gipsova_m2:0,
    putty_fina_m2:0, putty_fugi_m2:0,
  };
  // GK м²
  if(GKD){
    data.gk_ceil_m2 = GKD.tArea||0;
    document.querySelectorAll('.wall-btn[data-state]').forEach(wb=>{
      if((wb.dataset.state||'off')==='off') return;
      const r=wb.closest('.room-block');
      if(!r) return;
      const L=parseFloat(r.querySelector('.rLen')?.value)||0;
      const W=parseFloat(r.querySelector('.rWid')?.value)||0;
      const H=parseFloat(r.querySelector('.rHgt')?.value)||0;
      const wl=(wb.dataset.wall==='N'||wb.dataset.wall==='S')?L:W;
      data.gk_wall_m2+=wl*H;
    });
  }
  // Putty м² по услуга
  document.querySelectorAll('.wall-btn[data-pservice]').forEach(wb=>{
    const svc=wb.dataset.pservice||'off';
    if(svc==='off') return;
    const r=wb.closest('.putty-room');
    if(!r) return;
    const L=parseFloat(r.querySelector('.pL')?.value)||0;
    const W=parseFloat(r.querySelector('.pW')?.value)||0;
    const H=parseFloat(r.querySelector('.pH')?.value)||0;
    const wl=(wb.dataset.wall==='N'||wb.dataset.wall==='S')?L:W;
    const m2=wl*H;
    if(svc==='osnovna')     data.putty_osnovna_m2+=m2;
    else if(svc==='gipsova')     data.putty_gipsova_m2+=m2;
    else if(svc==='fina')        data.putty_fina_m2+=m2;
    else if(svc==='fugi')        data.putty_fugi_m2+=m2;
  });
  // Тавани шпакловка
  document.querySelectorAll('[id^="pceil-"]').forEach(c=>{
    const svc=c.dataset.pservice||'off';
    if(svc==='off') return;
    const r=c.closest('.putty-room');
    if(!r) return;
    const L=parseFloat(r.querySelector('.pL')?.value)||0;
    const W=parseFloat(r.querySelector('.pW')?.value)||0;
    const m2=L*W;
    if(svc==='osnovna')     data.putty_osnovna_m2+=m2;
    else if(svc==='gipsova')     data.putty_gipsova_m2+=m2;
    else if(svc==='fina')        data.putty_fina_m2+=m2;
    else if(svc==='fugi')        data.putty_fugi_m2+=m2;
  });
  // Закръгляме
  Object.keys(data).forEach(k=>{if(typeof data[k]==='number') data[k]=Math.round(data[k]*10)/10;});

  // ── Материали: събираме всички с количество и цена ──
  const show={
    board:  document.getElementById('mBoard')?.checked,
    profile:document.getElementById('mProfile')?.checked,
    hanger: document.getElementById('mHanger')?.checked,
    button: document.getElementById('mButton')?.checked,
    screws: document.getElementById('mScrews')?.checked,
    dowel:  document.getElementById('mDowel')?.checked,
    joint:  document.getElementById('mJoint')?.checked,
    finish: document.getElementById('mFinish')?.checked,
    tape:   document.getElementById('mTape')?.checked,
    ins:    document.getElementById('mIns')?.checked,
    primer: document.getElementById('mPrimer')?.checked,
    glue:   document.getElementById('mGlue')?.checked,
    foam:   document.getElementById('mFoam')?.checked,
  };
  const d=GKD;
  const mkMat=(key,rawQty,label)=>{
    // Вземаме ръчната корекция ако има такава
    const effectiveQty = ovr[key]!==undefined ? ovr[key] : rawQty;
    if(!(effectiveQty>0)) return null;
    const cfg=PKG[key]; if(!cfg||!cfg.price) return null;
    const pkgCount=cfg.ps>0?Math.ceil(effectiveQty/cfg.ps):Math.ceil(effectiveQty);
    const unitPrice=cfg.price*MARKUP;
    const total=unitPrice*pkgCount;
    const unitLabel=cfg.ps>0?`${cfg.pp} ${cfg.sz}`:cfg.pu;
    return {name:label||cfg.src, qty:pkgCount, unit:unitLabel, unitPrice:Math.round(unitPrice*100)/100, total:Math.round(total*100)/100};
  };
  const materials=[];
  const push=m=>{if(m) materials.push(m);};
  if(show.board){
    push(mkMat('board_std', d.board_std, 'Стандартен ГК плоскост (Knauf A13)'));
    if(d.hasGreen) push(mkMat('board_grn', d.board_grn, 'Влагоустойчив ГК плоскост (Knauf H13)'));
  }
  if(show.profile){
    push(mkMat('prof_ud', d.prof_ud, `UD профил ${d.pLen}м`));
    push(mkMat('prof_cd', d.prof_cd, `CD профил ${d.pLen}м`));
  }
  if(show.hanger) push(mkMat('hangers', d.hangers, 'Директни окачвачи'));
  if(show.button) push(mkMat('buttons', d.buttons, 'Копчета LN'));
  if(show.screws) push(mkMat('screws',  d.screws,  'Рапидки TN25'));
  if(show.dowel)  push(mkMat('dowels',  d.dowels,  'Метални дюбели 6×35мм'));
  if(show.joint)  push(mkMat('joint',   d.joint,   'Шпакловка за фуги (Knauf Fugenfüller)'));
  if(show.finish) push(mkMat('finish',  d.finish,  'Финишна шпакловка (Knauf Super Finish)'));
  if(show.tape)   push(mkMat('tape',    d.tape,    'Стъклофазерна лента'));
  if(show.primer) push(mkMat('primer',  d.primer,  'Грунд дълбокопроникващ'));
  if(show.ins && d.ins>0)  push(mkMat('ins',  d.ins,  'Изолация'));
  if(show.glue && d.glue>0) push(mkMat('glue', d.glue, 'Knauf Perlfix лепило'));
  if(show.foam && d.foam>0) push(mkMat('foam', d.foam, 'Монтажна пяна 750мл'));
  // Шпакловъчни материали
  if(PD.osnovna>0)      push(mkMat('p_osnovna', PD.osnovna, 'Основна мазилка 30кг'));
  if(PD.gipsova>0)      push(mkMat('p_gipsova', PD.gipsova, 'Knauf Gips Finish 20кг'));
  if(PD.gipsova_mesh>0) push(mkMat('p_mreja',   PD.gipsova_mesh, 'Армираща мрежа 50м²'));
  if(PD.fina>0)         push(mkMat('p_fina',    PD.fina,   'Knauf Finitura 20кг'));
  if(PD.fugi>0)         push(mkMat('p_fugi',    PD.fugi,   'Шпакловка фуги (Knauf) 25кг'));
  // Допълнителни материали от customMats масива
  (typeof customMats!=='undefined'?customMats:[]).forEach(m=>{
    if(m.name&&m.qty>0&&m.unitPrice>0){
      const total=Math.round(m.qty*(m.unitPrice*MARKUP)*100)/100;
      materials.push({name:m.name,qty:m.qty,unit:'бр.',unitPrice:Math.round(m.unitPrice*MARKUP*100)/100,total});
    }
  });

  data.materials = materials;
  localStorage.setItem('ir_calc_data', JSON.stringify(data));
  if(confirm('Данните са запазени. Отваряш офертата?')) window.location.href='offer.html';
}

function openProfiles(){
  const pLen=parseFloat(document.getElementById('pLen').value)||3;
  const rooms=[];
  document.querySelectorAll('#roomsContainer .room').forEach(r=>{
    const kind=r.dataset.kind;
    if(kind==='room'){
      const L=parseFloat(r.querySelector('.rLen').value)||0;
      const W=parseFloat(r.querySelector('.rWid').value)||0;
      const H=parseFloat(r.querySelector('.rHgt').value)||0;
      if(L<=0||W<=0||H<=0) return;
      const name=r.querySelector('.title-input').value||'Помещение';
      const ceilOn=r.querySelector('.ceil-card').dataset.on==='1';
      const walls={N:false,S:false,W:false,E:false};
      const wrapId='gkWrap-'+r.id.replace('r-','');
      r.querySelectorAll('#'+wrapId+' .wall-btn').forEach(wb=>{
        const s=wb.dataset.state||'off';
        if(s==='wall'||s==='glue') walls[wb.dataset.wall]=s;
      });
      rooms.push({name,L,W,H,ceil:ceilOn,walls});
    }
  });
  const data={
    project:document.getElementById('pName').value||'',
    date:document.getElementById('pDate').value||'',
    pLen, rooms
  };
  localStorage.setItem('ir_profiles_data',JSON.stringify(data));
  window.open('profiles.html','_blank');
}

function resetAll(){if(confirm('Нов проект?'))location.reload();}
window.onload=()=>{document.getElementById('pDate').valueAsDate=new Date();addRoom();};
